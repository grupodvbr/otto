<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Disparo em Massa</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  font-family:Inter;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#fff;
  padding:20px;
}

.container{
  max-width:500px;
  margin:auto;
}

h1{
  font-size:22px;
  margin-bottom:20px;
}

/* BOTÃO */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#fff;
  font-weight:700;
  cursor:pointer;
  margin-bottom:20px;
  transition:.2s;
}

button:disabled{
  opacity:.5;
  cursor:not-allowed;
}

button:hover{
  transform:scale(1.02);
}

/* PROGRESS */
.progress{
  height:22px;
  background:#1e293b;
  border-radius:12px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#22c55e,#4ade80);
  transition:.4s;
}

/* INFO */
.info{
  margin-top:15px;
  font-size:14px;
  line-height:1.6;
}

/* LOG */
.log{
  margin-top:20px;
  background:#020617;
  border-radius:10px;
  padding:10px;
  max-height:250px;
  overflow:auto;
  font-size:12px;
}

/* STATUS */
.ok{ color:#4ade80 }
.err{ color:#f87171 }
.warn{ color:#facc15 }

/* LOADING */
.loading{
  display:none;
  text-align:center;
  margin-top:10px;
}

.spinner{
  border:4px solid #1e293b;
  border-top:4px solid #22c55e;
  border-radius:50%;
  width:30px;
  height:30px;
  animation:spin 1s linear infinite;
  margin:auto;
}

@keyframes spin{
  0%{ transform:rotate(0deg) }
  100%{ transform:rotate(360deg) }
}
</style>
</head>

<body>

<div class="container">

<h1>📢 Disparo em Massa</h1>

<button id="btn" onclick="iniciar()">🚀 Iniciar Disparo</button>

<div class="loading" id="loading">
  <div class="spinner"></div>
</div>

<div class="progress">
  <div class="bar" id="bar"></div>
</div>

<div class="info" id="info"></div>

<div class="log" id="log"></div>

</div>

<script>

let interval = null

function safeJSON(res){
  return res.text().then(text=>{
    try{
      return JSON.parse(text)
    }catch{
      return { error:"Resposta inválida", raw:text }
    }
  })
}

async function iniciar(){

  const btn = document.getElementById("btn")
  const loading = document.getElementById("loading")

  btn.disabled = true
  loading.style.display = "block"

  try{

    const res = await fetch("/api/send-template-massa",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        template:"confirmao_de_reserva"
      })
    })

    const data = await safeJSON(res)

    if(!res.ok || data.error){
      throw new Error(data.error || "Erro ao iniciar disparo")
    }

    interval = setInterval(update, 1000)

  }catch(err){

    alert("❌ " + err.message)
    btn.disabled = false
    loading.style.display = "none"

  }

}

async function update(){

  try{

    const res = await fetch("/api/send-template-massa")
    const data = await safeJSON(res)

    if(!res.ok){
      throw new Error(data.error || "Erro ao buscar status")
    }

    document.getElementById("bar").style.width = (data.progresso || 0) + "%"

    document.getElementById("info").innerHTML = `
      📊 Enviados: ${data.enviados || 0}<br>
      ❌ Erros: ${data.erros || 0}<br>
      👥 Total: ${data.total || 0}<br>
      📱 Atual: ${data.atual || "-"}<br>
      📈 ${data.progresso || 0}%
    `

    document.getElementById("log").innerHTML =
      (data.logs || []).slice(-30).map(l => `
        <div class="${
          l.status === "ok" ? "ok" :
          l.status === "erro" ? "err" : "warn"
        }">
          📞 ${l.telefone} →
          ${l.status === "ok" ? "ENVIADO" : "ERRO"}
          ${l.detalhe ? " | " + l.detalhe : ""}
        </div>
      `).join("")

    if(data.finalizado){

      clearInterval(interval)

      document.getElementById("btn").disabled = false
      document.getElementById("loading").style.display = "none"

      alert("✅ Disparo finalizado")

    }

  }catch(err){

    console.error("Erro update:", err)

    document.getElementById("log").innerHTML += `
      <div class="err">❌ ERRO UPDATE: ${err.message}</div>
    `

  }

}
</script>

</body>
</html>
