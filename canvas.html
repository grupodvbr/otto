<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OTTO • AI Voice</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --primary:#22c55e;
  --secondary:#2563eb;
  --text:#fff;
  --sub:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
  background:var(--bg);
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
header{
  padding:15px;
  background:rgba(15,23,42,0.7);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.status{
  font-size:12px;
  color:var(--sub);
}

/* CHAT */
#chat{
  flex:1;
  padding:20px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:70%;
  padding:14px;
  border-radius:12px;
  animation:fade .3s;
}

.user{background:#2563eb;align-self:flex-end;}
.bot{background:#0f172a;}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* INPUT */
footer{
  display:flex;
  gap:10px;
  padding:10px;
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
}

/* MIC */
#mic{
  position:fixed;
  bottom:90px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#22c55e;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  cursor:pointer;
  box-shadow:0 0 30px rgba(34,197,94,0.5);
}
</style>
</head>

<body>

<header>
  <div>🤖 OTTO</div>
  <div class="status" id="status">Aguardando...</div>
</header>

<div id="chat"></div>

<div id="mic">🎤</div>

<footer>
  <input id="input" placeholder="Digite..." />
  <button id="send">Enviar</button>
</footer>

<script>
const chat = document.getElementById("chat")
const input = document.getElementById("input")
const statusEl = document.getElementById("status")

let ativo = false
let modoContinuo = false
let timerEnvio = null
let audioLiberado = false

document.body.onclick = ()=> audioLiberado = true

function status(t){ statusEl.innerText = t }

function addMsg(t, tipo){
  const d = document.createElement("div")
  d.className = "msg " + tipo
  d.innerText = t
  chat.appendChild(d)
  chat.scrollTop = chat.scrollHeight
}

function beep(){
  if(!audioLiberado) return
  new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play().catch(()=>{})
}

// ================= VOZ =================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition
const recognition = new SpeechRecognition()

recognition.lang = "pt-BR"
recognition.continuous = true
recognition.interimResults = false

recognition.onstart = ()=> status("🎤 Ouvindo...")
recognition.onend = ()=> setTimeout(()=>recognition.start(),500)

recognition.onresult = (e)=>{
  let textoFinal = ""

  for(let i=e.resultIndex;i<e.results.length;i++){
    if(e.results[i].isFinal){
      textoFinal = e.results[i][0].transcript.toLowerCase()
    }
  }

  if(!textoFinal) return

  console.log("🎤 FINAL:", textoFinal)

  const chamou =
    textoFinal.includes("otto") ||
    textoFinal.includes("oto") ||
    textoFinal.includes("otô")

  if(chamou && !modoContinuo){
    ativo = true
    beep()
    status("Ativo")
    return
  }

  if(modoContinuo) ativo = true

  if(!ativo) return

  let texto = textoFinal.replace(/otto|oto|otô/gi,"").trim()

  if(texto.length < 2) return

  // comandos
  if(texto.includes("modo contínuo") || texto.includes("modo continuo")){
    modoContinuo = true
    addMsg("Modo contínuo ativado","bot")
    falar("Modo contínuo ativado")
    return
  }

  if(texto.includes("desativar modo contínuo") || texto.includes("desativar modo continuo")){
    modoContinuo = false
    ativo = false
    addMsg("Modo contínuo desativado","bot")
    falar("Modo contínuo desativado")
    return
  }

  clearTimeout(timerEnvio)

  timerEnvio = setTimeout(()=>{
    enviar(texto)

    if(!modoContinuo){
      ativo = false
      status("Aguardando...")
    }

  },1200)
}

recognition.start()

// ================= API =================
async function enviar(texto){
  addMsg(texto,"user")

  status("Processando...")

  try{
    const res = await fetch("/api/admin-agente",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer mercatto_admin_2026"
      },
      body:JSON.stringify({
        pergunta:texto,
        numero:"557798253249"
      })
    })

    const data = await res.json()

    addMsg(data.resposta,"bot")
    falar(data.resposta)
    status("Aguardando...")
  }catch{
    addMsg("Erro ao conectar API","bot")
    status("Erro")
  }
}

// ================= VOZ =================
function falar(t){
  if(!audioLiberado) return
  const msg = new SpeechSynthesisUtterance(t)
  msg.lang = "pt-BR"
  speechSynthesis.speak(msg)
}

// ================= INPUT =================
document.getElementById("send").onclick=()=>{
  enviar(input.value)
  input.value=""
}

document.getElementById("mic").onclick=()=>{
  ativo = true
  beep()
  status("Ativo manual")
}
</script>

</body>
</html>
