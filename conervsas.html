<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>WhatsApp • Mercatto</title>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#0b0f1a;
  --card:#111827;
  --accent:#22c55e;
  --text:#fff;
  --muted:#9ca3af;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
  display:flex;
  height:100vh;
}

/* LISTA */
.sidebar{
  width:300px;
  background:#020617;
  border-right:1px solid #111;
  overflow-y:auto;
}

.contato{
  padding:14px;
  border-bottom:1px solid #111;
  cursor:pointer;
}

.contato:hover{
  background:#111827;
}

.contato.active{
  background:#1f2937;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.header{
  padding:14px;
  border-bottom:1px solid #111;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.mensagens{
  flex:1;
  overflow-y:auto;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:70%;
  padding:10px 14px;
  border-radius:12px;
}

.user{
  background:#1f2937;
  align-self:flex-start;
}

.bot{
  background:#22c55e;
  color:#000;
  align-self:flex-end;
}

/* INPUT */
.footer{
  display:flex;
  padding:10px;
  gap:10px;
  border-top:1px solid #111;
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
}

button{
  background:#22c55e;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

button.pause{
  background:#ef4444;
  color:#fff;
}

.log{
  font-size:12px;
  color:#9ca3af;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="lista"></div>

<!-- CHAT -->
<div class="chat">

<div class="header">
  <div id="numero">Selecione</div>

  <div>
    <button onclick="pausar()" class="pause">Pausar Bot</button>
    <button onclick="retomar()">Ativar Bot</button>
  </div>
</div>

<div class="mensagens" id="mensagens"></div>

<div class="footer">
  <input id="texto" placeholder="Digite...">
  <button onclick="enviar()">Enviar</button>
</div>

<div class="log" id="log"></div>

</div>

<script>

const supabase = supabase.createClient(
  "SUA_SUPABASE_URL",
  "SUA_SERVICE_ROLE"
)

let telefoneSelecionado = null

/* ================= LISTAR CONTATOS ================= */

async function carregarContatos(){

const { data } = await supabase
.from("conversas_whatsapp")
.select("telefone")
.order("created_at",{ascending:false})

const unicos = [...new Set(data.map(d=>d.telefone))]

const lista = document.getElementById("lista")
lista.innerHTML = ""

unicos.forEach(t=>{

const div = document.createElement("div")
div.className="contato"
div.innerText = t

div.onclick = ()=>{
telefoneSelecionado = t
document.getElementById("numero").innerText = t
carregarMensagens()
}

lista.appendChild(div)

})

}

/* ================= CARREGAR CHAT ================= */

async function carregarMensagens(){

if(!telefoneSelecionado) return

const { data } = await supabase
.from("conversas_whatsapp")
.select("*")
.eq("telefone",telefoneSelecionado)
.order("created_at",{ascending:true})

const box = document.getElementById("mensagens")
box.innerHTML=""

data.forEach(m=>{

const div = document.createElement("div")
div.className="msg "+(m.role==="assistant"?"bot":"user")
div.innerText = m.mensagem

box.appendChild(div)

})

box.scrollTop = box.scrollHeight

}

/* ================= ENVIAR ================= */

async function enviar(){

const texto = document.getElementById("texto").value

if(!texto || !telefoneSelecionado) return

log("Enviando...")

try{

const res = await fetch("/api/send",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
telefone:telefoneSelecionado,
mensagem:texto
})
})

const data = await res.json()

log("✅ Enviado")

document.getElementById("texto").value=""

carregarMensagens()

}catch(e){
log("❌ ERRO AO ENVIAR")
console.log(e)
}

}

/* ================= PAUSAR ================= */

async function pausar(){

if(!telefoneSelecionado) return

await supabase
.from("controle_bot")
.upsert({
telefone:telefoneSelecionado,
pausado:true
})

log("⛔ Bot pausado")

}

/* ================= RETOMAR ================= */

async function retomar(){

if(!telefoneSelecionado) return

await supabase
.from("controle_bot")
.upsert({
telefone:telefoneSelecionado,
pausado:false
})

log("✅ Bot ativado")

}

/* ================= LOG ================= */

function log(txt){
document.getElementById("log").innerText = txt
}

/* ================= AUTO LOAD ================= */

carregarContatos()

setInterval(()=>{
if(telefoneSelecionado){
carregarMensagens()
}
},3000)

</script>

</body>
</html>
