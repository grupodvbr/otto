<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Reservas</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Inter;
  background:#fff;
}

/* CONTAINER */
.box{
  width:100%;
  height:100%;
  padding:10px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  overflow:hidden; /* 🔥 trava scroll */
}

/* TOPO */
.top{
  display:flex;
  justify-content:space-between;
}

.kpi span{
  font-size:10px;
  color:#6b7280;
}

.kpi b{
  font-size:18px;
  font-weight:800;
}

/* STATUS */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:4px;
  margin-top:6px;
}

.mini{
  background:#f9fafb;
  border-radius:6px;
  padding:5px;
  text-align:center;
}

.mini span{
  font-size:9px;
  color:#6b7280;
}

.mini b{
  font-size:12px;
}

.ok{color:#16a34a}
.warn{color:#f59e0b}

/* TABELA */
.table{
  margin-top:6px;
  width:100%;
}

/* 🔥 GRID RESPONSIVO REAL */
.row{
  display:grid;
  grid-template-columns:15% 45% 15% 25%;
  font-size:10px;
  padding:3px 0;
  align-items:center;
  width:100%;
}

/* 🔥 ESSENCIAL PRA NÃO ESTOURAR */
.row div{
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.head{
  font-weight:700;
  color:#6b7280;
  border-bottom:1px solid #eee;
  margin-bottom:3px;
  padding-bottom:3px;
}

/* STATUS */
.badge{
  font-size:9px;
  padding:2px 4px;
  border-radius:5px;
  text-align:center;
}

.pendente{background:#fff7ed;color:#ea580c}
.confirmada{background:#eff6ff;color:#2563eb}
.concluida{background:#ecfdf5;color:#16a34a}
.cancelada{background:#fef2f2;color:#dc2626}

/* FOOTER */
.footer{
  font-size:9px;
  color:#6b7280;
  text-align:right;
}

</style>
</head>
<body>

<div class="box" id="conteudo">Carregando...</div>

<script>

const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

function hojeBR(){
  const d = new Date()
  const offset = d.getTimezoneOffset()*60000
  return new Date(d - offset).toISOString().slice(0,10)
}

async function carregar(){

  const hoje = hojeBR()

  const { data } = await sb
    .from("reservas_mercatto")
    .select("*")

  const hojeReservas = (data || []).filter(r=>{
    if(!r.datahora) return false
    const d = new Date(r.datahora)
    const local = new Date(d.getTime() - d.getTimezoneOffset()*60000)
    return local.toISOString().slice(0,10) === hoje
  })

  hojeReservas.sort((a,b)=> new Date(a.datahora) - new Date(b.datahora))

  const total = hojeReservas.length
  const pessoas = hojeReservas.reduce((a,b)=>a+Number(b.pessoas||0),0)

  const confirmadas = hojeReservas.filter(r=>r.status==="Confirmada").length
  const pendentes = hojeReservas.filter(r=>r.status==="Pendente").length
  const concluidas = hojeReservas.filter(r=>r.status==="Concluída").length

  const linhas = hojeReservas.slice(0,6).map(r=>{

    const d = new Date(r.datahora)
    const hora = d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})

    const status = (r.status || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g,'')

    return `
      <div class="row">
        <div>${hora}</div>
        <div>${r.nome || "-"}</div>
        <div>${r.pessoas || 0}</div>
        <div class="badge ${status}">${r.status || "-"}</div>
      </div>
    `
  }).join("")

  document.getElementById("conteudo").innerHTML = `

    <div>

      <div class="top">
        <div class="kpi">
          <span>Reservas</span>
          <b>${total}</b>
        </div>

        <div class="kpi">
          <span>Pessoas</span>
          <b>${pessoas}</b>
        </div>
      </div>

      <div class="grid">
        <div class="mini"><span>OK</span><b class="ok">${confirmadas}</b></div>
        <div class="mini"><span>Pend</span><b class="warn">${pendentes}</b></div>
        <div class="mini"><span>Done</span><b>${concluidas}</b></div>
      </div>

      <div class="table">
        <div class="row head">
          <div>H</div>
          <div>Cliente</div>
          <div>P</div>
          <div>S</div>
        </div>

        ${linhas || `<div class="row"><div>--</div><div>Sem reservas</div></div>`}
      </div>

    </div>

    <div class="footer">
      ${hoje.split("-").reverse().join("/")}
    </div>

  `
}

setInterval(carregar,10000)
carregar()

</script>

</body>
</html>
