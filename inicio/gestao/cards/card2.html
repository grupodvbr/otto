<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Resumo Reservas</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Inter;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100%;
}

.box{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:16px;
  gap:14px;
}

.linha{
  border-bottom:1px solid #eee;
  padding-bottom:10px;
}

.titulo{
  font-size:11px;
  color:#6b7280;
}

.valor{
  font-size:22px;
  font-weight:800;
  color:#111827;
}

.ok{ color:#16a34a }
.warn{ color:#f59e0b }
.danger{ color:#ef4444 }

.data{
  font-size:12px;
  color:#6b7280;
}

</style>
</head>
<body>

<div class="box" id="conteudo">
  Carregando...
</div>

<script>

const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

// 🔥 AJUSTA FUSO CORRETO
function hojeBR(){
  const agora = new Date()
  const offset = agora.getTimezoneOffset() * 60000
  const local = new Date(agora - offset)
  return local.toISOString().slice(0,10)
}

async function carregar(){

  const hoje = hojeBR()

  const { data } = await sb
    .from("reservas_mercatto")
    .select("*")

  if(!data){
    document.getElementById("conteudo").innerHTML = "Erro"
    return
  }

  // 🔥 FILTROS
  const hojeReservas = data.filter(r=>{
    if(!r.datahora) return false

    const d = new Date(r.datahora)
    const local = new Date(d.getTime() - d.getTimezoneOffset()*60000)
    return local.toISOString().slice(0,10) === hoje
  })

  const total = hojeReservas.length

  const confirmadas = hojeReservas.filter(r=>r.status === "Confirmada").length
  const pendentes = hojeReservas.filter(r=>r.status === "Pendente").length
  const concluidas = hojeReservas.filter(r=>r.status === "Concluída").length

  const pessoas = hojeReservas.reduce((acc,r)=> acc + Number(r.pessoas || 0),0)

  // 🔥 PRÓXIMA RESERVA
  const futuras = hojeReservas
    .filter(r=> new Date(r.datahora) > new Date())
    .sort((a,b)=> new Date(a.datahora) - new Date(b.datahora))

  let proxima = "--"
  if(futuras.length){
    const d = new Date(futuras[0].datahora)
    proxima = d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})
  }

  document.getElementById("conteudo").innerHTML = `

    <div class="linha">
      <div class="titulo">Reservas Hoje</div>
      <div class="valor">${total}</div>
    </div>

    <div class="linha">
      <div class="titulo">Pessoas</div>
      <div class="valor">${pessoas}</div>
    </div>

    <div class="linha">
      <div class="titulo">Confirmadas</div>
      <div class="valor ok">${confirmadas}</div>
    </div>

    <div class="linha">
      <div class="titulo">Pendentes</div>
      <div class="valor warn">${pendentes}</div>
    </div>

    <div class="linha">
      <div class="titulo">Concluídas</div>
      <div class="valor">${concluidas}</div>
    </div>

    <div>
      <div class="titulo">Próxima Reserva</div>
      <div class="valor">${proxima}</div>
      <div class="data">${hoje.split("-").reverse().join("/")}</div>
    </div>

  `
}

// 🔄 auto refresh
setInterval(carregar, 10000)
carregar()

</script>

</body>
</html>
