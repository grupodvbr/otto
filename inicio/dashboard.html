<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Dashboard Operacional</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}

body{
  background:#f1f5f9;
  color:#0f172a;
  height:100vh;
  overflow:hidden;
}

.header{
  height:56px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  border-bottom:1px solid #e5e7eb;
}

.container{
  position:absolute;
  top:56px;
  bottom:0;
  left:0;
  right:0;
  overflow:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.card{
  background:#fff;
  border-radius:14px;
  padding:14px;
  box-shadow:0 6px 18px rgba(0,0,0,.05);
}

.card-title{
  font-weight:700;
  margin-bottom:10px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.kpi{
  background:#f8fafc;
  padding:12px;
  border-radius:12px;
}

.kpi-title{
  font-size:11px;
  color:#64748b;
}

.kpi-value{
  font-size:18px;
  font-weight:700;
}

/* STATUS */
.tag{
  font-size:11px;
  padding:4px 8px;
  border-radius:20px;
}

.ok{background:#dcfce7;color:#16a34a}
.warn{background:#fef3c7;color:#d97706}
.bad{background:#fee2e2;color:#dc2626}

.linha{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  font-size:13px;
  border-bottom:1px solid #f1f5f9;
}

</style>
</head>

<body>

<div class="header">
  <div><b>Dashboard Operacional</b></div>
  <div style="font-size:12px;color:#22c55e">● Atualizando</div>
</div>

<div class="container">

  <!-- RESUMO GERAL -->
  <div class="card">
    <div class="card-title">📊 Resumo Geral</div>

    <div class="grid">
      <div class="kpi">
        <div class="kpi-title">Reservas Hoje</div>
        <div class="kpi-value" id="totalHoje">0</div>
      </div>

      <div class="kpi">
        <div class="kpi-title">Reservas Mês</div>
        <div class="kpi-value" id="totalMes">0</div>
      </div>

      <div class="kpi">
        <div class="kpi-title">Buffet Hoje</div>
        <div class="kpi-value" id="buffetHoje">0</div>
      </div>

      <div class="kpi">
        <div class="kpi-title">Empresas Ativas</div>
        <div class="kpi-value">3</div>
      </div>
    </div>
  </div>

  <!-- POR EMPRESA -->
  <div class="card">
    <div class="card-title">🏢 Por Empresa</div>

    <div id="empresas"></div>

  </div>

  <!-- STATUS -->
  <div class="card">
    <div class="card-title">📌 Status das Reservas</div>

    <div id="status"></div>

  </div>

</div>

<script>

const supabase = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

function hojeRange(){
  const d = new Date();
  const inicio = new Date(d.setHours(0,0,0,0)).toISOString();
  const fim = new Date(d.setHours(23,59,59,999)).toISOString();
  return {inicio,fim};
}

function mesRange(){
  const d = new Date();
  const inicio = new Date(d.getFullYear(), d.getMonth(), 1).toISOString();
  const fim = new Date().toISOString();
  return {inicio,fim};
}

async function carregar(){

  const hoje = hojeRange();
  const mes = mesRange();

  const tabelas = [
    {nome:"MERCATTO", tabela:"reservas_mercatto"},
    {nome:"VILLA", tabela:"reservas_villa"},
    {nome:"DELÍCIA", tabela:"reservas_delicia"}
  ];

  let totalHoje = 0;
  let totalMes = 0;
  let htmlEmpresas = "";
  let statusMap = {};

  for(const t of tabelas){

    // HOJE
    const {data: hojeData} = await supabase
    .from(t.tabela)
    .select("status")
    .gte("datahora", hoje.inicio)
    .lte("datahora", hoje.fim);

    // MES
    const {data: mesData} = await supabase
    .from(t.tabela)
    .select("status")
    .gte("datahora", mes.inicio)
    .lte("datahora", mes.fim);

    totalHoje += hojeData?.length || 0;
    totalMes += mesData?.length || 0;

    // STATUS
    hojeData?.forEach(r=>{
      statusMap[r.status] = (statusMap[r.status] || 0) + 1;
    });

    htmlEmpresas += `
      <div class="linha">
        <span>${t.nome}</span>
        <span>${hojeData?.length || 0} hoje</span>
      </div>
    `;
  }

  // BUFFET
  const {data: buffet} = await supabase
  .from("buffet_lancamentos")
  .select("id")
  .eq("data", new Date().toISOString().slice(0,10));

  document.getElementById("totalHoje").innerText = totalHoje;
  document.getElementById("totalMes").innerText = totalMes;
  document.getElementById("buffetHoje").innerText = buffet?.length || 0;

  document.getElementById("empresas").innerHTML = htmlEmpresas;

  // STATUS RENDER
  let htmlStatus = "";
  Object.keys(statusMap).forEach(s=>{
    htmlStatus += `
      <div class="linha">
        <span>${s}</span>
        <span>${statusMap[s]}</span>
      </div>
    `;
  });

  document.getElementById("status").innerHTML = htmlStatus;

}

// LOAD
carregar();

// AUTO UPDATE
setInterval(carregar, 30000);

</script>

</body>
</html>
