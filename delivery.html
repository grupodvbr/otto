<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Mercatto • Painel Delivery</title>

<meta name="viewport"
content="width=device-width, initial-scale=1, viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#f3f4f6;
--card:#ffffff;
--border:#e5e7eb;
--text:#0f172a;
--muted:#64748b;

--novo:#f97316;
--aceito:#2563eb;
--preparo:#f59e0b;
--pronto:#22c55e;
--entregue:#16a34a;
--cancelado:#ef4444;

--radius:14px;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Inter;
}

body{
background:var(--bg);
padding:16px;
color:var(--text);
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
}

h1{
font-size:22px;
font-weight:800;
}

.board{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:14px;
}

.col{
background:#fff;
border-radius:14px;
padding:10px;
border:1px solid var(--border);
min-height:70vh;
}

.col h3{
font-size:14px;
font-weight:800;
margin-bottom:10px;
}

.card{

background:#fff;
border:1px solid var(--border);
border-radius:12px;
padding:12px;
margin-bottom:10px;
cursor:pointer;
transition:.2s;

}

.card:hover{
transform:scale(1.02);
box-shadow:0 4px 14px rgba(0,0,0,.08);
}

.nome{
font-weight:700;
}

.info{
font-size:12px;
color:var(--muted);
margin-top:3px;
}

.total{
font-weight:800;
margin-top:5px;
}

.timer{
font-size:12px;
font-weight:700;
color:#ef4444;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
}

.modalBox{
background:white;
width:500px;
max-height:80vh;
overflow:auto;
border-radius:14px;
padding:20px;
}

.item{
display:flex;
gap:10px;
border:1px solid var(--border);
border-radius:10px;
padding:8px;
margin-top:10px;
}

.item img{
width:80px;
height:80px;
border-radius:8px;
object-fit:cover;
}

.actions{
margin-top:14px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
border:none;
padding:8px 12px;
border-radius:8px;
font-weight:700;
cursor:pointer;
}

.novo{background:var(--novo);color:white}
.aceito{background:var(--aceito);color:white}
.preparo{background:var(--preparo);color:white}
.pronto{background:var(--pronto);color:white}
.entregue{background:var(--entregue);color:white}
.cancelado{background:var(--cancelado);color:white}

.close{
float:right;
cursor:pointer;
font-weight:800;
}

</style>
</head>

<body>

<header>

<h1>🍔 Mercatto Delivery</h1>

<div id="hora"></div>

</header>

<div class="board">

<div class="col" data-status="novo">
<h3>🆕 Novos</h3>
</div>

<div class="col" data-status="aprovado">
<h3>✔ Aceitos</h3>
</div>

<div class="col" data-status="preparo">
<h3>👨‍🍳 Preparo</h3>
</div>

<div class="col" data-status="pronto">
<h3>📦 Pronto</h3>
</div>

<div class="col" data-status="entregue">
<h3>🚚 Entregue</h3>
</div>

</div>

<div id="modal" class="modal">

<div class="modalBox">

<span class="close" onclick="fechar()">X</span>

<h2 id="titulo"></h2>

<div id="itens"></div>

<div class="actions">

<button class="aceito" onclick="setStatus('aprovado')">Aceitar</button>
<button class="preparo" onclick="setStatus('preparo')">Preparo</button>
<button class="pronto" onclick="setStatus('pronto')">Pronto</button>
<button class="entregue" onclick="setStatus('entregue')">Entregue</button>
<button class="cancelado" onclick="setStatus('rejeitado')">Cancelar</button>

</div>

</div>

</div>

<script>

const db=supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let pedidos=[]
let atual=null

async function carregar(){

const {data}=await db
.from("pedidos")
.select("*")
.order("created_at",{ascending:false})

pedidos=data||[]

render()

}

function render(){

document.querySelectorAll(".col").forEach(c=>{
c.innerHTML="<h3>"+c.querySelector("h3").innerText+"</h3>"
})

pedidos.forEach(p=>{

const col=document.querySelector(`[data-status="${p.status}"]`)
if(!col)return

const card=document.createElement("div")
card.className="card"

const created=new Date(p.created_at)

const minutos=Math.floor((Date.now()-created)/60000)

let total=0
;(p.itens||[]).forEach(i=>total+=i.preco*i.quantidade)

card.innerHTML=`
<div class="nome">${p.cliente_nome}</div>
<div class="info">${p.cliente_telefone}</div>
<div class="timer">${minutos} min</div>
<div class="total">R$ ${total}</div>
`

card.onclick=()=>abrir(p)

col.appendChild(card)

})

}

async function abrir(p){

atual=p

document.getElementById("titulo").innerText=p.cliente_nome

const area=document.getElementById("itens")

area.innerHTML=""

for(const it of p.itens){

let foto=""

const {data}=await db
.from("buffet")
.select("foto_url")
.ilike("nome",it.nome)
.limit(1)

if(data.length) foto=data[0].foto_url

area.innerHTML+=`
<div class="item">

${foto?`<img src="${foto}">`:''}

<div>

<b>${it.nome}</b><br>
${it.quantidade}x R$ ${it.preco}

</div>

</div>
`

}

document.getElementById("modal").style.display="flex"

}

function fechar(){
document.getElementById("modal").style.display="none"
}

async function setStatus(s){

await db
.from("pedidos")
.update({status:s})
.eq("id",atual.id)

fechar()
carregar()

}

function atualizarHora(){
document.getElementById("hora").innerText=new Date().toLocaleTimeString()
}

setInterval(atualizarHora,1000)
setInterval(carregar,8000)

carregar()

</script>

</body>
</html>
