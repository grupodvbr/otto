<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parâmetros • Controle</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#f6f7fb;
  --card:#ffffff;
  --primary:#2563eb;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
}

*{box-sizing:border-box;font-family:Inter;}
body{margin:0;background:var(--bg);}

header{
  padding:20px;
  font-weight:800;
  font-size:22px;
}

.container{padding:20px;}

.topbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

input{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
}

button{
  background:var(--primary);
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
}

/* TABLE */
.table{
  background:var(--card);
  border-radius:14px;
  overflow:hidden;
}

.row{
  display:grid;
  grid-template-columns: 2fr 1fr 1fr 120px 160px;
  padding:14px;
  border-bottom:1px solid var(--border);
  align-items:center;
}

.row.header{
  font-weight:700;
  background:#f9fafb;
}

/* BADGE */
.badge{
  padding:6px 10px;
  border-radius:6px;
  font-size:12px;
}

.on{background:#dcfce7;color:#166534;}
.off{background:#fee2e2;color:#991b1b;}

/* JSON BONITO */
.code-json{
  background:#0f172a;
  color:#e5e7eb;
  padding:10px;
  border-radius:10px;
  font-family:monospace;
  font-size:12px;
  max-height:120px;
  overflow:auto;
}

.key{color:#38bdf8;}
.string{color:#34d399;}
.number{color:#fbbf24;}
.boolean{color:#f87171;}
.null{color:#a78bfa;}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:white;
  width:95%;
  max-width:900px;
  padding:20px;
  border-radius:16px;
}

textarea{
  width:100%;
  height:180px;
  background:#0f172a;
  color:#fff;
  border-radius:10px;
  padding:10px;
  font-family:monospace;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#111;
  color:white;
  padding:12px;
  border-radius:8px;
  opacity:0;
  transition:.3s;
}
.toast.show{opacity:1;}
</style>
</head>

<body>

<header>⚙️ Controle de Parâmetros</header>

<div class="container">

<div class="topbar">
<input id="busca" placeholder="Buscar...">
<input id="empresaFiltro" placeholder="Empresa">
<input id="tipoFiltro" placeholder="Tipo">
<button onclick="abrirModal()">+ Novo</button>
</div>

<div class="table" id="tabela"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Editar Parâmetro</h3>

    <input id="nome" placeholder="Nome"><br><br>
    <input id="empresa" placeholder="Empresa"><br><br>
    <input id="tipo" placeholder="Tipo"><br><br>

    <textarea id="json"></textarea>

    <br><br>
    <button onclick="salvar()">Salvar</button>
    <button onclick="fecharModal()">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const supabase = window.supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let dados=[]
let editando=null

function toast(msg){
  toastEl.innerText=msg
  toastEl.classList.add("show")
  setTimeout(()=>toastEl.classList.remove("show"),2000)
}

const toastEl=document.getElementById("toast")

async function carregar(){
  let {data}=await supabase
  .from("parametros_sistema")
  .select("*")
  .order("criado_em",{ascending:false})

  dados=data||[]
  render()
}

function colorJSON(obj){
  let json=JSON.stringify(obj,null,2)
  return json
  .replace(/"(.*?)":/g,'<span class="key">"$1"</span>:')
  .replace(/: "(.*?)"/g,': <span class="string">"$1"</span>')
  .replace(/: (\d+)/g,': <span class="number">$1</span>')
  .replace(/: (true|false)/g,': <span class="boolean">$1</span>')
  .replace(/: null/g,': <span class="null">null</span>')
}

function render(){
  let busca=busca.value.toLowerCase()
  let emp=empresaFiltro.value.toLowerCase()
  let tipo=tipoFiltro.value.toLowerCase()

  tabela.innerHTML=`
    <div class="row header">
      <div>Nome</div>
      <div>Empresa</div>
      <div>Tipo</div>
      <div>Status</div>
      <div>Ações</div>
    </div>
  `

  dados
  .filter(p=>
    (!busca || p.nome_parametro.toLowerCase().includes(busca)) &&
    (!emp || (p.empresa||'').toLowerCase().includes(emp)) &&
    (!tipo || (p.tipo||'').toLowerCase().includes(tipo))
  )
  .forEach(p=>{
    tabela.innerHTML+=`
      <div class="row">
        <div>
          <b>${p.nome_parametro}</b>
          <div class="code-json">${colorJSON(p.dados)}</div>
        </div>

        <div>${p.empresa||'-'}</div>
        <div>${p.tipo||'-'}</div>

        <div>
          <span class="badge ${p.ativo?'on':'off'}">
            ${p.ativo?'Ativo':'Inativo'}
          </span>
        </div>

        <div>
          <button onclick='editar(${JSON.stringify(p)})'>Editar</button>
          <button onclick='toggle("${p.id}",${p.ativo})'>Status</button>
        </div>
      </div>
    `
  })
}

function abrirModal(){
  editando=null
  modal.style.display="flex"
  json.value="{}"
}

function fecharModal(){
  modal.style.display="none"
}

function editar(p){
  editando=p.id
  modal.style.display="flex"

  nome.value=p.nome_parametro
  empresa.value=p.empresa||''
  tipo.value=p.tipo||''
  json.value=JSON.stringify(p.dados,null,2)
}

async function salvar(){
  let dadosJSON

  try{
    dadosJSON=JSON.parse(json.value)
  }catch{
    toast("JSON inválido")
    return
  }

  let payload={
    nome_parametro:nome.value,
    empresa:empresa.value,
    tipo:tipo.value,
    dados:dadosJSON
  }

  if(editando){
    await supabase.from("parametros_sistema")
    .update(payload)
    .eq("id",editando)
  }else{
    await supabase.from("parametros_sistema")
    .insert(payload)
  }

  toast("Salvo")
  fecharModal()
  carregar()
}

async function toggle(id,status){
  await supabase.from("parametros_sistema")
  .update({ativo:!status})
  .eq("id",id)

  toast("Atualizado")
  carregar()
}

busca.oninput=render
empresaFiltro.oninput=render
tipoFiltro.oninput=render

carregar()
</script>

</body>
</html>
