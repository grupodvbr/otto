<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parâmetros • Sistema</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#f6f7fb;
  --card:#ffffff;
  --primary:#2563eb;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#64748b;
}

*{box-sizing:border-box;font-family:Inter}
body{margin:0;background:var(--bg)}

/* HEADER */
.header{
  padding:20px;
  font-size:22px;
  font-weight:800;
}

/* FILTROS */
.topbar{
  display:flex;
  gap:10px;
  padding:0 20px 20px;
}

input{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:20px;
  padding:0 20px 20px;
}

/* CARD */
.card{
  background:var(--card);
  border-radius:16px;
  padding:16px;
  border:1px solid var(--border);
  display:flex;
  flex-direction:column;
  gap:10px;
  transition:.2s;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 15px 30px rgba(0,0,0,.08);
}

.nome{
  font-weight:700;
  font-size:16px;
}

.mini{
  font-size:13px;
  color:var(--muted);
}

/* JSON */
.jsonBox{
  background:#0f172a;
  color:#e5e7eb;
  border-radius:10px;
  padding:12px;
  font-family:monospace;
  font-size:12px;

  max-height:140px;
  overflow:auto; /* 🔥 scroll interno */

  line-height:1.5;
}

/* CORES JSON */
.key{color:#38bdf8}
.string{color:#34d399}
.number{color:#fbbf24}
.boolean{color:#f87171}

/* STATUS */
.status{
  font-size:12px;
  font-weight:600;
}

.ativo{color:#22c55e}
.inativo{color:#ef4444}

/* BOTÕES */
.actions{
  display:flex;
  gap:8px;
}

button{
  flex:1;
  border:none;
  padding:8px;
  border-radius:10px;
  cursor:pointer;
  font-size:12px;
}

.edit{background:#3b82f6;color:#fff}
.toggle{background:#22c55e;color:#fff}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
}

.modalBox{
  background:#fff;
  width:95%;
  max-width:800px;
  padding:20px;
  border-radius:16px;
}

textarea{
  width:100%;
  height:200px;
  background:#0f172a;
  color:#fff;
  border-radius:10px;
  padding:10px;
  font-family:monospace;
}

</style>
</head>

<body>

<div class="header">⚙️ Parâmetros do Sistema</div>

<div class="topbar">
<input id="busca" placeholder="Buscar">
<input id="empresaFiltro" placeholder="Empresa">
<input id="tipoFiltro" placeholder="Tipo">
<button onclick="novo()">+ Novo</button>
</div>

<div class="grid" id="lista"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modalBox">
    <h3>Editar</h3>

    <input id="nome"><br><br>
    <input id="empresa"><br><br>
    <input id="tipo"><br><br>

    <textarea id="json"></textarea>

    <br><br>
    <button onclick="salvar()">Salvar</button>
    <button onclick="fechar()">Cancelar</button>
  </div>
</div>

<script>
const sb = window.supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let dados=[]
let editando=null

function colorJSON(obj){
  let json=JSON.stringify(obj,null,2)
  return json
  .replace(/"(.*?)":/g,'<span class="key">"$1"</span>:')
  .replace(/: "(.*?)"/g,': <span class="string">"$1"</span>')
  .replace(/: (\d+)/g,': <span class="number">$1</span>')
  .replace(/: (true|false)/g,': <span class="boolean">$1</span>')
}

async function carregar(){
  const {data}=await sb.from("parametros_sistema").select("*")
  dados=data||[]
  render()
}

function render(){
  let b=busca.value.toLowerCase()
  let e=empresaFiltro.value.toLowerCase()
  let t=tipoFiltro.value.toLowerCase()

  lista.innerHTML=""

  dados
  .filter(p=>
    (!b || p.nome_parametro.toLowerCase().includes(b)) &&
    (!e || (p.empresa||'').toLowerCase().includes(e)) &&
    (!t || (p.tipo||'').toLowerCase().includes(t))
  )
  .forEach(p=>{
    lista.innerHTML+=`
      <div class="card">

        <div class="nome">${p.nome_parametro}</div>

        <div class="mini">${p.empresa || '-'}</div>
        <div class="mini">${p.tipo || '-'}</div>

        <div class="jsonBox">${colorJSON(p.dados)}</div>

        <div class="status ${p.ativo?'ativo':'inativo'}">
          ${p.ativo?'● Ativo':'● Inativo'}
        </div>

        <div class="actions">
          <button class="edit" onclick='editar(${JSON.stringify(p)})'>Editar</button>
          <button class="toggle" onclick='toggle("${p.id}",${p.ativo})'>Status</button>
        </div>

      </div>
    `
  })
}

function novo(){
  editando=null
  modal.style.display="flex"
  json.value="{}"
}

function fechar(){
  modal.style.display="none"
}

function editar(p){
  editando=p.id
  modal.style.display="flex"

  nome.value=p.nome_parametro
  empresa.value=p.empresa||''
  tipo.value=p.tipo||''
  json.value=JSON.stringify(p.dados,null,2)
}

async function salvar(){
  let dadosJSON

  try{
    dadosJSON=JSON.parse(json.value)
  }catch{
    alert("JSON inválido")
    return
  }

  const payload={
    nome_parametro:nome.value,
    empresa:empresa.value,
    tipo:tipo.value,
    dados:dadosJSON
  }

  if(editando){
    await sb.from("parametros_sistema")
      .update(payload)
      .eq("id",editando)
  }else{
    await sb.from("parametros_sistema")
      .insert(payload)
  }

  fechar()
  carregar()
}

async function toggle(id,status){
  await sb.from("parametros_sistema")
    .update({ativo:!status})
    .eq("id",id)

  carregar()
}

busca.oninput=render
empresaFiltro.oninput=render
tipoFiltro.oninput=render

carregar()
</script>

</body>
</html>
