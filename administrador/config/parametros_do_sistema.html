<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parâmetros • Controle</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#f6f7fb;
  --card:#ffffff;
  --primary:#2563eb;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
}

*{box-sizing:border-box;font-family:Inter;}

body{margin:0;background:var(--bg);}

header{
  padding:20px;
  font-weight:800;
  font-size:22px;
}

.container{padding:20px;}

.topbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

input,select{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
}

button{
  background:var(--primary);
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
}

.table{
  background:var(--card);
  border-radius:14px;
  overflow:hidden;
}

.row{
  display:grid;
  grid-template-columns: 2fr 1fr 1fr 120px 140px;
  padding:14px;
  border-bottom:1px solid var(--border);
  align-items:center;
}

.row.header{
  font-weight:700;
  background:#f9fafb;
}

.badge{
  padding:6px 10px;
  border-radius:6px;
  font-size:12px;
}

.on{background:#dcfce7;color:#166534;}
.off{background:#fee2e2;color:#991b1b;}

.actions button{
  padding:6px 8px;
  font-size:12px;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:white;
  width:600px;
  max-width:95%;
  padding:20px;
  border-radius:14px;
}

textarea{
  width:100%;
  height:160px;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
}

.loader{
  position:fixed;
  inset:0;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
}

.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#111;
  color:white;
  padding:12px 16px;
  border-radius:8px;
  opacity:0;
  transition:.3s;
}
.toast.show{opacity:1;}
</style>
</head>

<body>

<div class="loader" id="loader">Carregando...</div>

<header>⚙️ Controle de Parâmetros</header>

<div class="container">

<div class="topbar">
<input id="busca" placeholder="Buscar...">
<input id="empresaFiltro" placeholder="Empresa">
<input id="tipoFiltro" placeholder="Tipo">
<button onclick="abrirModal()">+ Novo</button>
</div>

<div class="table" id="tabela"></div>

</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h3 id="titulo">Novo Parâmetro</h3>

    <input id="nome" placeholder="Nome"><br><br>
    <input id="empresa" placeholder="Empresa"><br><br>
    <input id="tipo" placeholder="Tipo"><br><br>

    <textarea id="json"></textarea>

    <br><br>
    <button onclick="salvar()">Salvar</button>
    <button onclick="fecharModal()">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let dados = []
let editando = null

function toast(msg){
  let t = document.getElementById("toast")
  t.innerText = msg
  t.classList.add("show")
  setTimeout(()=>t.classList.remove("show"),2000)
}

function showLoader(v){
  loader.style.display = v ? "flex" : "none"
}

async function carregar(){
  showLoader(true)

  let { data, error } = await supabaseClient
    .from("parametros_sistema")
    .select("*")
    .order("criado_em",{ascending:false})

  if(error){
    toast("Erro ao carregar")
    console.error(error)
  }

  dados = data || []
  render()

  showLoader(false)
}

function render(){
  let busca = document.getElementById("busca").value.toLowerCase()
  let emp = empresaFiltro.value.toLowerCase()
  let tipo = tipoFiltro.value.toLowerCase()

  let filtrado = dados.filter(p=>{
    return (
      (!busca || p.nome_parametro.toLowerCase().includes(busca)) &&
      (!emp || (p.empresa||'').toLowerCase().includes(emp)) &&
      (!tipo || (p.tipo||'').toLowerCase().includes(tipo))
    )
  })

  tabela.innerHTML = `
    <div class="row header">
      <div>Nome</div>
      <div>Empresa</div>
      <div>Tipo</div>
      <div>Status</div>
      <div>Ações</div>
    </div>
  `

  filtrado.forEach(p=>{
    tabela.innerHTML += `
      <div class="row">
        <div>${p.nome_parametro}</div>
        <div>${p.empresa||'-'}</div>
        <div>${p.tipo||'-'}</div>
        <div>
          <span class="badge ${p.ativo?'on':'off'}">
            ${p.ativo?'Ativo':'Inativo'}
          </span>
        </div>
        <div class="actions">
          <button onclick='editar(${JSON.stringify(p)})'>Editar</button>
          <button onclick='toggle("${p.id}",${p.ativo})'>Status</button>
          <button onclick='remover("${p.id}")'>Excluir</button>
        </div>
      </div>
    `
  })
}

function abrirModal(){
  editando=null
  modal.style.display="flex"
  json.value="{}"
}

function fecharModal(){
  modal.style.display="none"
}

function editar(p){
  editando=p.id
  modal.style.display="flex"

  nome.value=p.nome_parametro
  empresa.value=p.empresa||''
  tipo.value=p.tipo||''
  json.value=JSON.stringify(p.dados,null,2)
}

async function salvar(){
  let dadosJSON

  try{
    dadosJSON = JSON.parse(json.value)
  }catch{
    toast("JSON inválido")
    return
  }

  showLoader(true)

  let res

  if(editando){
    res = await supabaseClient.from("parametros_sistema")
      .update({
        nome_parametro:nome.value,
        empresa:empresa.value,
        tipo:tipo.value,
        dados:dadosJSON
      })
      .eq("id",editando)
  }else{
    res = await supabaseClient.from("parametros_sistema")
      .insert({
        nome_parametro:nome.value,
        empresa:empresa.value,
        tipo:tipo.value,
        dados:dadosJSON
      })
  }

  showLoader(false)

  if(res.error){
    toast("Erro ao salvar")
    console.error(res.error)
    return
  }

  toast("Salvo com sucesso")
  fecharModal()
  carregar()
}

async function remover(id){
  if(!confirm("Excluir?")) return

  await supabaseClient.from("parametros_sistema").delete().eq("id",id)
  toast("Excluído")
  carregar()
}

async function toggle(id,status){
  await supabaseClient.from("parametros_sistema")
    .update({ativo:!status})
    .eq("id",id)

  toast("Atualizado")
  carregar()
}

busca.oninput = render
empresaFiltro.oninput = render
tipoFiltro.oninput = render

carregar()
</script>

</body>
</html>
