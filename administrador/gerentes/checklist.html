<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agenda Checklist</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* RESET */
*{
  box-sizing:border-box;
}

/* BODY */
body{
  margin:0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(180deg,#f8fafc,#eef2f7);
  padding:20px;
  display:flex;
  justify-content:center;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:900px;
}

/* CARD */
.card{
  background:#fff;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
  border:1px solid #e5e7eb;
}

/* TITULOS */
h3{
  margin:0 0 10px;
  font-size:16px;
  font-weight:700;
  color:#111827;
}

/* INPUT */
input{
  width:100%;
  padding:12px 14px;
  border-radius:10px;
  border:1px solid #d1d5db;
  margin-top:6px;
  font-size:14px;
  transition:0.2s;
}

input:focus{
  border-color:#3b82f6;
  outline:none;
  box-shadow:0 0 0 2px rgba(59,130,246,0.1);
}

/* LISTA AUTOCOMPLETE */
.lista{
  border:1px solid #e5e7eb;
  border-radius:10px;
  max-height:180px;
  overflow:auto;
  margin-top:8px;
  background:#fff;
}

.item{
  padding:12px;
  cursor:pointer;
  font-size:14px;
  font-weight:500;
  transition:0.2s;
}

.item:hover{
  background:#f1f5f9;
}

/* TABELA */
table{
  width:100%;
  margin-top:15px;
  border-collapse:collapse;
  font-size:13px;
}

th{
  background:#f9fafb;
  font-weight:700;
  color:#374151;
}

td,th{
  padding:10px;
  border-bottom:1px solid #e5e7eb;
  text-align:center;
}

/* STATUS */
td:nth-child(4){
  font-weight:700;
}

/* BOTÕES */
button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  font-size:13px;
  transition:0.2s;
}

button:hover{
  transform:scale(1.03);
}

/* BOTÃO PRINCIPAL */
button[onclick="salvar()"]{
  width:100%;
  margin-top:10px;
  background:linear-gradient(90deg,#2563eb,#3b82f6);
  color:#fff;
}

/* BOTÃO REMOVER */
button[onclick^="rem"]{
  background:#ef4444;
  color:#fff;
}

/* MODAL */
#modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  align-items:center;
  justify-content:center;
  backdrop-filter: blur(4px);
}

/* BOX MODAL */
#modal div{
  background:#fff;
  padding:25px;
  border-radius:16px;
  width:280px;
  box-shadow:0 20px 50px rgba(0,0,0,0.15);
}

/* TITULO MODAL */
#modal h4{
  margin-top:0;
  margin-bottom:10px;
  font-size:16px;
}

/* BOTAO MODAL */
#modal button{
  width:100%;
  margin-top:10px;
  background:#3b82f6;
  color:#fff;
}

/* RESPONSIVO */
@media(max-width:600px){

  body{
    padding:10px;
  }

  .card{
    padding:15px;
  }

  table{
    font-size:11px;
  }

}
</style>
</head>

<body>

<div class="card">
<h3>Selecionar Usuário</h3>

<input id="buscaUsuario" placeholder="Digite o nome...">
<div id="listaUsuarios" class="lista"></div>

<input type="date" id="data">
</div>

<div class="card">
<h3>Buscar Tarefa</h3>

<input id="buscaTarefa" placeholder="Digite tarefa...">
<div id="listaTarefas" class="lista"></div>
</div>

<div class="card">
<h3>Agenda</h3>

<table>
<thead>
<tr>
<th>Tarefa</th>
<th>Inicio</th>
<th>Fim</th>
<th>Status</th>
<th></th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<button onclick="salvar()">Salvar</button>
</div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);align-items:center;justify-content:center">
<div style="background:#fff;padding:20px;border-radius:10px;width:250px">

<h4>Horário</h4>
<input type="time" id="inicio">
<input type="time" id="fim">

<button onclick="confirmar()">OK</button>

</div>
</div>

<script>
const sb = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let usuarioSelecionado=null;
let tarefas=[];
let tempTarefa=null;

// 🔎 BUSCAR USUARIO (IGUAL SEU SISTEMA)
buscaUsuario.onkeyup = async ()=>{

const q = buscaUsuario.value;

if(q.length < 1){
listaUsuarios.innerHTML="";
return;
}

const { data } = await sb
.from("usuarios_do_sistema")
.select("usuario,nome,setor")
.ilike("nome", `%${q}%`)
.limit(10);

listaUsuarios.innerHTML="";

data.forEach(u=>{
listaUsuarios.innerHTML+=`
<div class="item" onclick="selUser('${u.usuario}','${u.nome}')">
${u.nome} (${u.setor || 'SEM SETOR'})
</div>
`;
});
};

function selUser(usuario,nome){
usuarioSelecionado=usuario;
buscaUsuario.value=nome;
listaUsuarios.innerHTML="";
}

// 🔎 BUSCAR TAREFA
buscaTarefa.onkeyup = async ()=>{

const q = buscaTarefa.value;

if(q.length < 1){
listaTarefas.innerHTML="";
return;
}

const { data } = await sb
.from("checklist_mercatto")
.select("*")
.ilike("tarefa", `%${q}%`)
.limit(10);

listaTarefas.innerHTML="";

data.forEach(t=>{
listaTarefas.innerHTML+=`
<div class="item" onclick="add('${t.tarefa}')">
${t.tarefa}
</div>
`;
});
};

function add(t){
tempTarefa=t;
modal.style.display="flex";
}

// CONFIRMAR HORARIO
function confirmar(){

const inicio = document.getElementById("inicio").value;
const fim = document.getElementById("fim").value;

tarefas.push({tarefa:tempTarefa,inicio,fim});

modal.style.display="none";
render();
}

// RENDER
function render(){

tabela.innerHTML="";

tarefas.forEach((t,i)=>{

const agora = new Date();
const hoje = agora.toISOString().split("T")[0];
const fim = new Date(`${hoje}T${t.fim}`);

const status = agora > fim ? "Atrasado" : "Dentro";

tabela.innerHTML+=`
<tr>
<td>${t.tarefa}</td>
<td>${t.inicio}</td>
<td>${t.fim}</td>
<td>${status}</td>
<td><button onclick="rem(${i})">X</button></td>
</tr>
`;
});
}

function rem(i){
tarefas.splice(i,1);
render();
}

// SALVAR
async function salvar(){

const dataAgenda = document.getElementById("data").value;

const inserts = tarefas.map(t=>({
usuario:usuarioSelecionado,
tarefa:t.tarefa,
data:dataAgenda,
hora_inicio:t.inicio,
hora_fim:t.fim,
status_execucao:"pendente"
}));

await sb.from("agenda_checklist").insert(inserts);

alert("Salvo!");
tarefas=[];
render();
}
</script>

</body>
</html>
