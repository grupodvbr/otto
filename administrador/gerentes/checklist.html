<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agenda Checklist</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{font-family:Inter;margin:0;background:#f1f5f9}
header{background:#020617;color:#fff;padding:15px;font-size:20px}
.container{padding:20px}

.card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

input{
  padding:10px;
  width:100%;
  border:1px solid #ccc;
  border-radius:6px;
  margin-bottom:10px;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.btn-add{background:#22c55e;color:#fff}
.btn-remove{background:#ef4444;color:#fff}
.btn-save{background:#3b82f6;color:#fff;width:100%}

.lista{
  max-height:200px;
  overflow:auto;
  border:1px solid #ccc;
}

.item{
  padding:10px;
  cursor:pointer;
}
.item:hover{background:#e2e8f0}

table{width:100%;border-collapse:collapse}
td,th{padding:10px;border-bottom:1px solid #ddd;text-align:center}
th{background:#f8fafc}

.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:300px;
}
</style>
</head>

<body>

<header>Agenda Checklist</header>

<div class="container">

<!-- USUARIO -->
<div class="card">
<h3>Selecionar Funcionário</h3>

<input type="text" id="buscaUsuario" placeholder="Buscar usuário...">
<div class="lista" id="listaUsuarios"></div>

<input type="date" id="data">
</div>

<!-- TAREFAS -->
<div class="card">
<h3>Buscar Tarefas</h3>

<input type="text" id="buscaTarefa" placeholder="Buscar tarefa...">
<div class="lista" id="listaTarefas"></div>
</div>

<!-- PLANILHA -->
<div class="card">
<h3>Agenda</h3>

<table>
<thead>
<tr>
<th>Tarefa</th>
<th>Inicio</th>
<th>Fim</th>
<th>Status</th>
<th></th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

<button class="btn-save" onclick="salvar()">Salvar</button>

</div>

</div>

<!-- MODAL HORARIO -->
<div class="modal" id="modal">
<div class="modal-box">
<h3>Definir Horário</h3>

<input type="time" id="inicio">
<input type="time" id="fim">

<button class="btn-add" onclick="confirmarHorario()">Confirmar</button>

</div>
</div>

<script>
const client = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let usuarioSelecionado = null;
let tarefas = [];
let tarefaTemp = null;

// ================= USUARIOS =================
document.getElementById('buscaUsuario').addEventListener('input', async e=>{
  const termo = e.target.value;

  const { data } = await client
    .from('usuarios')
    .select('*')
    .ilike('nome', `%${termo}%`);

  const lista = document.getElementById('listaUsuarios');
  lista.innerHTML = '';

  data.forEach(u=>{
    const div = document.createElement('div');
    div.className='item';
    div.innerText = u.nome + ' ('+u.setor+')';

    div.onclick = ()=>{
      usuarioSelecionado = u.usuario;
      document.getElementById('buscaUsuario').value = u.nome;
      lista.innerHTML = '';
    };

    lista.appendChild(div);
  });
});

// ================= TAREFAS =================
document.getElementById('buscaTarefa').addEventListener('input', async e=>{
  const termo = e.target.value;

  const { data } = await client
    .from('checklist_mercatto')
    .select('*')
    .ilike('tarefa', `%${termo}%`);

  const lista = document.getElementById('listaTarefas');
  lista.innerHTML = '';

  data.forEach(t=>{
    const div = document.createElement('div');
    div.className='item';
    div.innerText = t.tarefa;

    div.onclick = ()=>{
      tarefaTemp = t.tarefa;
      abrirModal();
    };

    lista.appendChild(div);
  });
});

// ================= MODAL =================
function abrirModal(){
  document.getElementById('modal').style.display='flex';
}

function confirmarHorario(){
  const inicio = document.getElementById('inicio').value;
  const fim = document.getElementById('fim').value;

  tarefas.push({
    tarefa: tarefaTemp,
    inicio,
    fim
  });

  document.getElementById('modal').style.display='none';
  render();
}

// ================= RENDER =================
function render(){
  const tbody = document.getElementById('tabela');
  tbody.innerHTML='';

  tarefas.forEach((t,i)=>{

    const agora = new Date();
    const hoje = agora.toISOString().split('T')[0];
    const dataFim = new Date(`${hoje}T${t.fim}`);

    let status = agora > dataFim ? 'Atrasado' : 'Dentro';

    const tr = document.createElement('tr');

    tr.innerHTML=`
      <td>${t.tarefa}</td>
      <td>${t.inicio}</td>
      <td>${t.fim}</td>
      <td style="color:${status=='Atrasado'?'red':'green'}">${status}</td>
      <td><button class="btn-remove" onclick="remover(${i})">X</button></td>
    `;

    tbody.appendChild(tr);
  });
}

// ================= REMOVER =================
function remover(i){
  tarefas.splice(i,1);
  render();
}

// ================= SALVAR =================
async function salvar(){

  const data = document.getElementById('data').value;

  if(!usuarioSelecionado || tarefas.length == 0){
    alert('Preencha tudo');
    return;
  }

  const inserts = tarefas.map(t=>({
    usuario: usuarioSelecionado,
    tarefa: t.tarefa,
    data,
    hora_inicio: t.inicio,
    hora_fim: t.fim,
    status_execucao: 'pendente'
  }));

  const { error } = await client
    .from('agenda_checklist')
    .insert(inserts);

  if(error){
    console.log(error);
    alert('Erro ao salvar');
    return;
  }

  alert('Salvo com sucesso!');
  tarefas = [];
  render();
}
</script>

</body>
</html>
