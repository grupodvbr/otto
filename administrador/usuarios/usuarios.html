<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Usuários • Mercatto</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#f1f5f9;
  --card:#ffffff;
  --border:#e2e8f0;
  --text:#0f172a;
  --muted:#64748b;
  --primary:#22c55e;
  --danger:#ef4444;
  --blue:#2563eb;
}

/* RESET */
*{box-sizing:border-box;font-family:Inter}
body{margin:0;background:var(--bg);color:var(--text)}

/* HEADER */
.header{
  position:fixed;
  top:0;left:0;right:0;
  background:#fff;
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
  z-index:10;
}

.title{
  font-size:18px;
  font-weight:800;
}

.badge{
  background:var(--primary);
  color:#000;
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
  font-weight:700;
}

/* CONTAINER */
.container{
  padding:80px 12px 20px;
  max-width:1200px;
  margin:auto;
}

/* FILTROS */
.filtros{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:16px;
}

input,select{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#fff;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:12px;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:8px;
  transition:.2s;
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.nome{
  font-weight:700;
  font-size:15px;
}

.mini{
  font-size:13px;
  color:var(--muted);
}

/* STATUS */
.status{
  font-size:13px;
  font-weight:600;
}

.ativo{color:var(--primary)}
.inativo{color:var(--danger)}

/* BUTTONS */
.botoes{
  display:flex;
  gap:6px;
  margin-top:8px;
}

button{
  flex:1;
  border:none;
  padding:10px;
  border-radius:10px;
  font-weight:600;
  font-size:13px;
}

.aprovar{background:var(--primary)}
.editar{background:var(--blue);color:#fff}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:flex-end;
  justify-content:center;
}

.modalBox{
  background:#fff;
  width:100%;
  max-width:500px;
  border-radius:20px 20px 0 0;
  padding:20px;
  animation:up .3s;
}

@keyframes up{
  from{transform:translateY(100%)}
  to{transform:translateY(0)}
}

.modal input, .modal select{
  width:100%;
  margin-bottom:10px;
}

.salvar{
  background:var(--primary);
  font-weight:800;
}

/* LOADER */
.loader{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.7);
  display:none;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  color:#fff;
  padding:12px 16px;
  border-radius:12px;
  display:none;
}

/* MOBILE AJUSTES */
@media(max-width:500px){
  .title{font-size:16px}
  button{font-size:12px}
}
</style>
</head>

<body>

<div class="header">
  <div class="title">👥 Usuários</div>
  <div class="badge" id="total">0</div>
</div>

<div class="container">

  <div class="filtros">
    <input id="busca" placeholder="Buscar usuário...">
    
    <select id="empresaFiltro">
      <option value="">Empresas</option>
      <option>MERCATTO DELICIA</option>
      <option>VILLA GOURMET</option>
      <option>EMPORIO MERCATTO</option>
    </select>
  </div>

  <div class="grid" id="lista"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modalBox">

    <h3>Editar Usuário</h3>

    <input id="nome" placeholder="Nome">
    <input id="email" placeholder="Email">
    <input id="telefone" placeholder="Telefone">
    <input id="cargo" placeholder="Cargo">

    <select id="empresa">
      <option>MERCATTO DELICIA</option>
      <option>VILLA GOURMET</option>
      <option>EMPORIO MERCATTO</option>
    </select>

    <select id="sexo">
      <option>Masculino</option>
      <option>Feminino</option>
      <option>Outro</option>
    </select>

    <button class="salvar" onclick="salvar()">Salvar</button>

  </div>
</div>

<div class="loader" id="loader">Carregando...</div>
<div class="toast" id="toast"></div>

<script>

// 🔥 SUPABASE
const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let dados = []
let atual = null

const loader = document.getElementById("loader")
const toast = document.getElementById("toast")

function showLoader(v){ loader.style.display = v ? "flex":"none" }

function toastMsg(msg){
  toast.innerText = msg
  toast.style.display="block"
  setTimeout(()=>toast.style.display="none",2000)
}

// 🔥 LOAD
async function carregar(){
  showLoader(true)

  const {data,error} = await sb
    .from("usuarios_do_sistema")
    .select("*")
    .order("criado_em",{ascending:false})

  if(error){
    toastMsg("Erro ao carregar")
    showLoader(false)
    return
  }

  dados = data
  total.innerText = dados.length

  render()
  showLoader(false)
}

// 🔥 RENDER
function render(){
  const busca = buscaInput.value.toLowerCase()
  const empresa = empresaFiltro.value

  lista.innerHTML=""

  dados
  .filter(u =>
    (!busca || u.nome?.toLowerCase().includes(busca)) &&
    (!empresa || u.empresa === empresa)
  )
  .forEach(u=>{
    lista.innerHTML += `
      <div class="card">
        <div class="nome">${u.nome}</div>
        <div class="mini">${u.cargo || ''}</div>
        <div class="mini">${u.empresa}</div>

        <div class="status ${u.ativo?'ativo':'inativo'}">
          ${u.ativo?'● Ativo':'● Inativo'}
        </div>

        <div class="botoes">
          <button class="aprovar" onclick="toggle('${u.id}',${u.ativo})">
            ${u.ativo?'Desativar':'Ativar'}
          </button>

          <button class="editar" onclick="abrir('${u.id}')">
            Editar
          </button>
        </div>
      </div>
    `
  })
}

// 🔥 TOGGLE
async function toggle(id,ativo){
  await sb.from("usuarios_do_sistema")
    .update({ativo:!ativo})
    .eq("id",id)

  toastMsg("Atualizado")
  carregar()
}

// 🔥 MODAL
function abrir(id){
  atual = dados.find(x=>x.id===id)

  modal.style.display="flex"

  nome.value = atual.nome || ""
  email.value = atual.email || ""
  telefone.value = atual.telefone || ""
  cargo.value = atual.cargo || ""
  empresa.value = atual.empresa || ""
  sexo.value = atual.sexo || "Masculino"
}

// 🔥 SALVAR
async function salvar(){
  showLoader(true)

  await sb.from("usuarios_do_sistema")
    .update({
      nome:nome.value,
      email:email.value,
      telefone:telefone.value,
      cargo:cargo.value,
      empresa:empresa.value,
      sexo:sexo.value,
      atualizado_em:new Date()
    })
    .eq("id",atual.id)

  modal.style.display="none"
  toastMsg("Salvo com sucesso")
  carregar()
}

// 🔥 EVENTS
const buscaInput = document.getElementById("busca")
buscaInput.oninput = render
empresaFiltro.onchange = render

// 🔥 INIT
carregar()

</script>

</body>
</html>
