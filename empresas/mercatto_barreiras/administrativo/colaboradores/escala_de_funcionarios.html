<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RH + Escala • Mercatto</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
  margin:0;
  font-family:Inter;
  background:#f3f4f6;
}

/* HEADER */
header{
  background:#fff;
  padding:15px;
  border-bottom:1px solid #ddd;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* DASHBOARD */
.dashboard{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:15px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
}

/* CALENDARIO */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
  padding:15px;
}

.day{
  background:#fff;
  border-radius:10px;
  padding:8px;
  min-height:120px;
}

.item{
  font-size:11px;
  background:#dbeafe;
  margin-top:4px;
  padding:4px;
  border-radius:6px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
}

.box{
  background:#fff;
  padding:20px;
  border-radius:12px;
  width:420px;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  padding:10px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}

.listaFunc{
  padding:15px;
}

.funcCard{
  background:#fff;
  padding:10px;
  border-radius:8px;
  margin-bottom:8px;
}

</style>
</head>

<body>

<header>
  <b>RH • Mercatto</b>

  <div>
    <select id="filtroSetor"></select>
    <button onclick="abrirCadastro()">+ Funcionário</button>
  </div>
</header>

<!-- DASHBOARD -->
<div class="dashboard">
  <div class="card" id="total"></div>
  <div class="card" id="ativos"></div>
  <div class="card" id="horas"></div>
  <div class="card" id="semEscala"></div>
</div>

<!-- FUNCIONARIOS -->
<div class="listaFunc" id="listaFunc"></div>

<!-- CALENDARIO -->
<div id="calendar" class="calendar"></div>

<!-- MODAL ESCALA -->
<div id="modal" class="modal">
  <div class="box">
    <h3 id="data"></h3>

    <select id="funcionario"></select>

    <input type="time" id="entrada">
    <input type="time" id="saida">

    <button onclick="add()">Adicionar</button>

    <div id="lista"></div>

    <button onclick="fechar()">Fechar</button>
  </div>
</div>

<!-- MODAL CADASTRO -->
<div id="cadastro" class="modal">
  <div class="box">

    <h3>Novo Funcionário</h3>

    <input id="nome" placeholder="Nome completo">
    <input id="numero" placeholder="WhatsApp">

    <select id="sexo">
      <option>MASCULINO</option>
      <option>FEMININO</option>
    </select>

    <input type="date" id="nascimento">
    <input type="date" id="contratacao">

    <input id="funcao" placeholder="Função">
    <select id="setor"></select>

    <input id="salario" placeholder="Salário">
    <input id="folga" placeholder="Dia de folga">

    <input id="cpf" placeholder="CPF">
    <input id="endereco" placeholder="Endereço">

    <select id="status">
      <option>ATIVO</option>
      <option>INATIVO</option>
    </select>

    <button onclick="salvarFuncionario()">Salvar</button>

  </div>
</div>

<script>

const SETORES=["COZINHA","SALÃO","BAR","CAIXA","LIMPEZA"]

const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let funcionarios=[]
let escalas=[]
let dataSelecionada=null

/* INIT */
function initSetores(){
  filtroSetor.innerHTML="<option value=''>TODOS</option>"
  setor.innerHTML=""

  SETORES.forEach(s=>{
    filtroSetor.innerHTML+=`<option>${s}</option>`
    setor.innerHTML+=`<option>${s}</option>`
  })
}

/* LOAD */
async function load(){

  const {data:f}=await sb.from("funcionarios_mercatto").select("*")
  const {data:e}=await sb.from("escala_funcionarios").select("*")

  funcionarios=f||[]
  escalas=e||[]

  renderTudo()
}

/* FILTRO */
function getFiltro(){
  if(!filtroSetor.value) return funcionarios
  return funcionarios.filter(f=>f.setor===filtroSetor.value)
}

/* DASHBOARD */
function renderDashboard(){

  const ativos=funcionarios.filter(f=>f.status==="ATIVO")

  let minutos=0

  escalas.forEach(e=>{
    if(!e.entrada||!e.saida) return
    const [h1,m1]=e.entrada.split(":")
    const [h2,m2]=e.saida.split(":")
    minutos+=(h2*60+m2)-(h1*60+m1)
  })

  total.innerText=`Total: ${funcionarios.length}`
  ativosEl.innerText=`Ativos: ${ativos.length}`
  horas.innerText=`Horas: ${(minutos/60).toFixed(1)}`

  semEscala.innerText=`Sem escala: ${
    ativos.filter(f=>!escalas.find(e=>e.funcionario_id===f.id)).length
  }`
}

/* FUNCIONARIOS */
function renderFuncionarios(){

  listaFunc.innerHTML=""

  getFiltro().forEach(f=>{
    listaFunc.innerHTML+=`
    <div class="funcCard">
      <b>${f.nome}</b><br>
      ${f.funcao} • ${f.setor}<br>
      ${f.numero}
    </div>`
  })
}

/* CALENDARIO */
function renderCalendario(){

  calendar.innerHTML=""

  for(let i=1;i<=31;i++){

    let d=document.createElement("div")
    d.className="day"
    d.innerHTML=`<b>${i}</b>`

    escalas.forEach(e=>{
      if(new Date(e.data).getDate()===i){
        d.innerHTML+=`
        <div class="item">
          ${e.nome}<br>
          ${e.entrada}-${e.saida}
        </div>`
      }
    })

    d.onclick=()=>abrir(i)

    calendar.appendChild(d)
  }
}

/* ESCALA */
function abrir(dia){

  const hoje=new Date()
  const data=`${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,"0")}-${String(dia).padStart(2,"0")}`

  dataSelecionada=data
  modal.style.display="flex"

  funcionario.innerHTML=""
  funcionarios.forEach(f=>{
    funcionario.innerHTML+=`<option value="${f.id}">${f.nome}</option>`
  })
}

function fechar(){ modal.style.display="none" }

async function add(){

  const f=funcionarios.find(x=>x.id==funcionario.value)

  await sb.from("escala_funcionarios").insert({
    funcionario_id:f.id,
    nome:f.nome,
    setor:f.setor,
    data:dataSelecionada,
    entrada:entrada.value,
    saida:saida.value
  })

  load()
}

/* SALVAR */
async function salvarFuncionario(){

  await sb.from("funcionarios_mercatto").insert({
    nome:nome.value,
    numero:numero.value,
    sexo:sexo.value,
    data_nascimento:nascimento.value,
    data_contratacao:contratacao.value,
    funcao:funcao.value,
    setor:setor.value,
    salario:salario.value,
    folga:folga.value,
    cpf:cpf.value,
    endereco:endereco.value,
    status:status.value
  })

  cadastro.style.display="none"
  load()
}

/* RENDER */
function renderTudo(){
  renderDashboard()
  renderFuncionarios()
  renderCalendario()
}

initSetores()
load()

</script>

</body>
</html>
