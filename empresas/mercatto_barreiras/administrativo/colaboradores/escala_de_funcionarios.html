<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel RH • Mercatto</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
  margin:0;
  font-family:Inter;
  background:#f3f4f6;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#fff;
  border-right:1px solid #ddd;
  padding:15px;
}

.menu-item{
  padding:10px;
  cursor:pointer;
  border-radius:8px;
}

.menu-item:hover{
  background:#f1f5f9;
}

/* MAIN */
.main{
  flex:1;
}

/* HEADER */
header{
  background:#fff;
  padding:15px;
  border-bottom:1px solid #ddd;
  display:flex;
  justify-content:space-between;
}

/* DASHBOARD */
.dashboard{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:15px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
}

/* CALENDAR */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
  padding:15px;
}

.day{
  background:#fff;
  border-radius:10px;
  padding:8px;
  min-height:120px;
}

.item{
  font-size:11px;
  background:#dbeafe;
  margin-top:4px;
  padding:4px;
  border-radius:6px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
}

.box{
  background:#fff;
  padding:20px;
  border-radius:12px;
  width:400px;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  margin-top:10px;
  padding:10px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">

  <b>Painel</b>

  <div class="menu-item" onclick="trocar('dashboard')">Dashboard</div>
  <div class="menu-item" onclick="trocar('func')">Funcionários</div>
  <div class="menu-item" onclick="trocar('escala')">Escala</div>

</div>

<div class="main">

<header>
  <b id="titulo">Dashboard</b>

  <select id="filtroSetor" onchange="renderTudo()"></select>
</header>

<div id="conteudo"></div>

</div>

<!-- MODAL FUNC -->
<div id="modalFunc" class="modal">
  <div class="box">

    <h3>Novo Funcionário</h3>

    <input id="nome" placeholder="Nome completo">
    <input id="numero" placeholder="WhatsApp">

    <select id="sexo">
      <option>MASCULINO</option>
      <option>FEMININO</option>
    </select>

    <input type="date" id="nascimento">
    <input type="date" id="contratacao">

    <input id="funcao" placeholder="Função">

    <select id="setor"></select>

    <input id="folga" placeholder="Dia de folga">

    <button onclick="salvarFuncionario()">Salvar</button>

  </div>
</div>

<script>

const SETORES=[
  "COZINHA",
  "SALÃO",
  "CAIXA",
  "BAR",
  "LIMPEZA",
  "ADMINISTRATIVO"
]

const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let funcionarios=[]
let escalas=[]
let tela="dashboard"

/* INIT */
function initSetores(){

  filtroSetor.innerHTML=`<option value="">TODOS</option>`
  setor.innerHTML=""

  SETORES.forEach(s=>{
    filtroSetor.innerHTML+=`<option>${s}</option>`
    setor.innerHTML+=`<option>${s}</option>`
  })
}

/* LOAD */
async function load(){
  const {data:f}=await sb.from("funcionarios_mercatto").select("*")
  const {data:e}=await sb.from("escala_funcionarios").select("*")

  funcionarios=f||[]
  escalas=e||[]

  renderTudo()
}

/* TROCA */
function trocar(t){
  tela=t
  titulo.innerText=t.toUpperCase()
  renderTudo()
}

/* FILTRO */
function getFiltrado(){

  const s=filtroSetor.value

  if(!s) return {funcionarios,escalas}

  return {
    funcionarios:funcionarios.filter(f=>f.setor===s),
    escalas:escalas.filter(e=>e.setor===s)
  }
}

/* DASHBOARD */
function renderDashboard(){

  const {funcionarios:func,escalas:esc}=getFiltrado()

  let totalMin=0

  esc.forEach(e=>{
    if(!e.entrada||!e.saida) return
    const [h1,m1]=e.entrada.split(":")
    const [h2,m2]=e.saida.split(":")
    totalMin+=(h2*60+m2)-(h1*60+m1)
  })

  const horas=(totalMin/60).toFixed(1)

  conteudo.innerHTML=`
    <div class="dashboard">

      <div class="card">Funcionários: ${func.length}</div>
      <div class="card">Horas: ${horas}</div>
      <div class="card">Média: ${(horas/(func.length||1)).toFixed(1)}</div>
      <div class="card">Sem escala: ${
        func.filter(f=>!esc.find(e=>e.funcionario_id===f.id)).length
      }</div>

    </div>
  `
}

/* FUNCIONARIOS */
function renderFuncionarios(){

  conteudo.innerHTML=`
    <div style="padding:15px">
      <button onclick="modalFunc.style.display='flex'">+ Novo</button>

      ${funcionarios.map(f=>`
        <div class="card">
          <b>${f.nome}</b><br>
          ${f.funcao} • ${f.setor}<br>
          ${f.numero}
        </div>
      `).join("")}

    </div>
  `
}

/* ESCALA */
function renderEscala(){

  let html='<div class="calendar">'

  for(let i=1;i<=31;i++){

    html+=`<div class="day"><b>${i}</b>`

    escalas.forEach(e=>{
      if(new Date(e.data).getDate()===i){
        html+=`
        <div class="item">
          ${e.nome}<br>
          ${e.entrada}-${e.saida}
        </div>`
      }
    })

    html+='</div>'
  }

  html+='</div>'

  conteudo.innerHTML=html
}

/* RENDER GERAL */
function renderTudo(){

  if(tela==="dashboard") renderDashboard()
  if(tela==="func") renderFuncionarios()
  if(tela==="escala") renderEscala()
}

/* SALVAR FUNC */
async function salvarFuncionario(){

  await sb.from("funcionarios_mercatto").insert({
    nome:nome.value,
    numero:numero.value,
    sexo:sexo.value,
    data_nascimento:nascimento.value,
    data_contratacao:contratacao.value,
    funcao:funcao.value,
    setor:setor.value,
    folga:folga.value
  })

  modalFunc.style.display="none"
  load()
}

initSetores()
load()

</script>

</body>
</html>
