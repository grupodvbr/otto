<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Mercatto • Cotações</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
  --bg:#f5f6f8;
  --card:#ffffff;
  --line:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
  --primary:#111827;
  --green:#16a34a;
  --yellow:#ca8a04;
  --red:#dc2626;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter;
}

body{
  background:var(--bg);
  color:var(--text);
}

/* ================= TOPO ================= */

.top{
  background:#fff;
  border-bottom:1px solid var(--line);
  padding:14px 18px;
  position:sticky;
  top:0;
  z-index:100;
}

.top-flex{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.top h1{
  font-size:22px;
  font-weight:800;
}

.top small{
  color:var(--muted);
}

.btn{
  border:none;
  background:#111827;
  color:#fff;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-size:13px;
  font-weight:700;
}

/* ================= LAYOUT ================= */

.layout{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:16px;
  padding:16px;
}

@media(max-width:1100px){

  .layout{
    grid-template-columns:1fr;
  }

}

/* ================= SIDEBAR ================= */

.sidebar{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  overflow:hidden;
}

.search{
  width:100%;
  border:none;
  border-bottom:1px solid var(--line);
  padding:14px;
  outline:none;
}

.lista{
  max-height:calc(100vh - 150px);
  overflow:auto;
}

.cotacao{
  padding:14px;
  border-bottom:1px solid var(--line);
  cursor:pointer;
}

.cotacao:hover{
  background:#fafafa;
}

.cotacao.active{
  background:#eef2ff;
}

.cotacao h3{
  font-size:14px;
  margin-bottom:4px;
}

.cotacao small{
  font-size:12px;
  color:#6b7280;
}

/* ================= MAIN ================= */

.main{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  overflow:hidden;
}

/* ================= HEADER ================= */

.main-top{
  padding:14px 18px;
  border-bottom:1px solid var(--line);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.main-top h2{
  font-size:20px;
}

.main-top small{
  color:#6b7280;
}

.status{
  padding:6px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
}

.ativa{
  background:#dcfce7;
  color:#166534;
}

.respondida{
  background:#fef3c7;
  color:#92400e;
}

.finalizada{
  background:#fee2e2;
  color:#991b1b;
}

/* ================= TABELA ================= */

.table-wrap{
  width:100%;
  overflow:auto;
}

table{
  width:100%;
  min-width:1600px;
  border-collapse:collapse;
}

thead{
  background:#f9fafb;
  position:sticky;
  top:0;
  z-index:10;
}

th{
  border-bottom:1px solid var(--line);
  border-right:1px solid var(--line);
  padding:10px;
  text-align:left;
  font-size:11px;
  text-transform:uppercase;
  color:#6b7280;
  white-space:nowrap;
}

td{
  border-bottom:1px solid #f1f5f9;
  border-right:1px solid #f1f5f9;
  padding:8px;
  vertical-align:top;
  font-size:13px;
}

tr:hover{
  background:#fafafa;
}

/* ================= INPUT ================= */

.input{
  width:100%;
  border:1px solid var(--line);
  border-radius:8px;
  padding:8px;
  font-size:13px;
  outline:none;
  background:#fff;
}

textarea.input{
  min-height:38px;
  resize:vertical;
}

/* ================= FORNECEDORES ================= */

.fornecedor-select{
  display:flex;
  flex-direction:column;
  gap:8px;
  min-width:320px;
}

.for-search{
  width:100%;
  border:1px solid var(--line);
  border-radius:8px;
  padding:8px;
  font-size:12px;
}

.tags{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}

.tag{
  display:flex;
  align-items:center;
  gap:8px;
  background:#111827;
  color:#fff;
  padding:7px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
}

.tag button{
  border:none;
  background:none;
  color:#fff;
  cursor:pointer;
  font-size:12px;
  font-weight:800;
}

/* ================= DROPDOWN ================= */

.dropdown{
  border:1px solid var(--line);
  border-radius:10px;
  max-height:220px;
  overflow:auto;
  background:#fff;
}

.dropdown-item{
  padding:10px;
  border-bottom:1px solid #f3f4f6;
  cursor:pointer;
  font-size:12px;
}

.dropdown-item:hover{
  background:#f9fafb;
}

/* ================= RESPOSTAS ================= */

.response{
  border:1px solid var(--line);
  border-radius:10px;
  padding:10px;
  margin-bottom:8px;
  background:#fafafa;
}

.response strong{
  display:block;
  margin-bottom:8px;
  font-size:12px;
}

.response-grid{
  display:grid;
  grid-template-columns:
  repeat(auto-fit,minmax(120px,1fr));
  gap:8px;
}

.response-box{
  background:#fff;
  border:1px solid var(--line);
  border-radius:8px;
  padding:8px;
}

.response-box span{
  display:block;
  font-size:10px;
  color:#6b7280;
  margin-bottom:4px;
}

.response-box b{
  font-size:12px;
}

/* ================= EMPTY ================= */

.empty{
  padding:70px;
  text-align:center;
  color:#6b7280;
}

/* ================= OVERLAY ================= */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.6);
  backdrop-filter:blur(4px);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
  font-size:20px;
  font-weight:800;
}

</style>
</head>

<body>

<div class="top">

  <div class="top-flex">

    <div>

      <h1>Cotações</h1>

      <small>
        Gestão inteligente de fornecedores
      </small>

    </div>

    <button
      class="btn"
      onclick="carregarCotacoes()">

      Atualizar

    </button>

  </div>

</div>

<div class="layout">

  <!-- ================= SIDEBAR ================= -->

  <div class="sidebar">

    <input
      class="search"
      id="buscaCotacao"
      placeholder="Pesquisar cotação..."
      oninput="filtrarCotacoes()"
    >

    <div
      class="lista"
      id="listaCotacoes">
    </div>

  </div>

  <!-- ================= MAIN ================= -->

  <div class="main">

    <div id="detalhes">

      <div class="empty">

        Selecione uma cotação

      </div>

    </div>

  </div>

</div>

<div
  class="overlay"
  id="overlay">

  Processando...

</div>

<script>

const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let cotacoes = [];
let fornecedores = [];
let cotacaoAtual = null;

/* ================= INIT ================= */

init();

async function init(){

  overlay(true);

  await carregarFornecedores();
  await carregarCotacoes();

  overlay(false);
}

/* ================= OVERLAY ================= */

function overlay(show){

  document.getElementById("overlay")
    .style.display =
      show ? "flex" : "none";
}

/* ================= FORNECEDORES ================= */

async function carregarFornecedores(){

  const { data } = await sb

    .from("fornecedores_mercatto")

    .select("*")

    .eq("ativo", true)

    .order("nome");

  fornecedores = data || [];
}

/* ================= COTAÇÕES ================= */

async function carregarCotacoes(){

  const { data } = await sb

    .from("cotacoes")

    .select("*")

    .order(
      "data_cotacao",
      { ascending:false }
    );

  cotacoes = data || [];

  renderCotacoes(cotacoes);

  if(cotacaoAtual){

    const nova =
      cotacoes.find(c =>

        c.id === cotacaoAtual.id

      );

    if(nova){

      cotacaoAtual = nova;

      abrirCotacao(nova);
    }
  }
}

/* ================= LISTA ================= */

function renderCotacoes(arr){

  const lista =
    document.getElementById(
      "listaCotacoes"
    );

  lista.innerHTML = "";

  arr.forEach(c => {

    lista.innerHTML += `

      <div
        class="cotacao ${
          cotacaoAtual &&
          cotacaoAtual.id === c.id
          ? "active"
          : ""
        }"

        onclick='abrirCotacao(
          ${JSON.stringify(c)}
        )'>

        <h3>
          ${c.nome || "Cotação"}
        </h3>

        <small>
          ${formatarData(c.data_cotacao)}
        </small>

      </div>

    `;

  });

}

/* ================= ABRIR ================= */

function abrirCotacao(c){

  cotacaoAtual = c;

  renderCotacoes(cotacoes);

  const detalhes =
    document.getElementById(
      "detalhes"
    );

  const itens = c.itens || [];
  const itensCotacao =
    c.itens_cotacao || [];

  detalhes.innerHTML = `

    <div class="main-top">

      <div>

        <h2>
          ${c.nome}
        </h2>

        <small>
          ${formatarData(c.data_cotacao)}
        </small>

      </div>

      <div class="
        status

        ${
          c.status === "finalizada"
          ? "finalizada"
          : c.status === "respondida"
          ? "respondida"
          : "ativa"
        }
      ">

        ${(c.status || "ativa")
          .toUpperCase()}

      </div>

    </div>

    <div class="table-wrap">

      <table>

        <thead>

          <tr>

            <th>Produto</th>
            <th>Atual</th>
            <th>Mínimo</th>
            <th>Ideal</th>
            <th>Comprar</th>
            <th>Fornecedores</th>
            <th>Respostas</th>

          </tr>

        </thead>

        <tbody>

          ${itens.map((i,index)=>{

            const itemCotado =
              itensCotacao.find(x =>

                x.produto === i.produto

              ) || {

                produto:i.produto,
                qtd_solicitada:
                  i.comprar || 0,
                fornecedores:[]

              };

            return `

              <tr>

                <!-- PRODUTO -->

                <td>

                  <b>
                    ${i.produto}
                  </b>

                </td>

                <td>${i.atual || 0}</td>
                <td>${i.minimo || 0}</td>
                <td>${i.ideal || 0}</td>
                <td>${i.comprar || 0}</td>

                <!-- ================= FORNECEDORES ================= -->

                <td style="width:380px;">

                  <div class="fornecedor-select">

                    <!-- PESQUISA -->

                    <input
                      class="for-search"
                      placeholder="Pesquisar fornecedor..."
                      oninput="
                        pesquisarFornecedor(
                          this,
                          'drop_${index}'
                        )
                      "
                    >

                    <!-- TAGS -->

                    <div class="tags">

                      ${itemCotado.fornecedores.map(f=>`

                        <div class="tag">

                          ${f.fornecedor_nome}

                          <button
                            onclick="
                              removerFornecedor(
                                '${c.id}',
                                '${i.produto}',
                                '${f.fornecedor_id}'
                              )
                            ">

                            ✕

                          </button>

                        </div>

                      `).join("")}

                    </div>

                    <!-- DROPDOWN -->

                    <div
                      class="dropdown"
                      id="drop_${index}">

                      ${fornecedores

                        .filter(f => {

                          return !itemCotado
                          .fornecedores
                          .some(x =>

                            x.fornecedor_id === f.id

                          );

                        })

                        .map(f=>`

                          <div
                            class="dropdown-item"

                            data-nome="${f.nome}"

                            onclick="
                              adicionarFornecedor(
                                '${c.id}',
                                '${i.produto}',
                                '${f.id}',
                                '${f.nome}',
                                ${i.comprar || 0}
                              )
                            ">

                            ${f.nome}

                          </div>

                        `).join("")}

                    </div>

                  </div>

                </td>

                <!-- ================= RESPOSTAS ================= -->

                <td style="
                  min-width:650px;
                ">

                  ${
                    itemCotado.fornecedores.length

                    ? itemCotado.fornecedores.map(f=>`

                      <div class="response">

                        <strong>

                          ${f.fornecedor_nome}

                        </strong>

                        <div class="response-grid">

                          <div class="response-box">
                            <span>Marca</span>
                            <b>${f.marca || "-"}</b>
                          </div>

                          <div class="response-box">
                            <span>Preço</span>
                            <b>
                              ${
                                f.preco_unitario
                                ? "R$ " +
                                  Number(
                                    f.preco_unitario
                                  ).toFixed(2)
                                : "-"
                              }
                            </b>
                          </div>

                          <div class="response-box">
                            <span>Total</span>
                            <b>
                              ${
                                f.preco_total
                                ? "R$ " +
                                  Number(
                                    f.preco_total
                                  ).toFixed(2)
                                : "-"
                              }
                            </b>
                          </div>

                          <div class="response-box">
                            <span>Prazo</span>
                            <b>${f.prazo || "-"}</b>
                          </div>

                          <div class="response-box">
                            <span>Unidade</span>
                            <b>${f.unidade || "-"}</b>
                          </div>

                          <div class="response-box">
                            <span>Emb.</span>
                            <b>
                              ${
                                f.quantidade_embalagem
                                || "-"
                              }
                            </b>
                          </div>

                        </div>

                      </div>

                    `).join("")

                    : `
                      <small>
                        Nenhum fornecedor
                      </small>
                    `
                  }

                </td>

              </tr>

            `;

          }).join("")}

        </tbody>

      </table>

    </div>

  `;
}

/* ================= ADICIONAR ================= */

async function adicionarFornecedor(
  cotacaoId,
  produto,
  fornecedorId,
  fornecedorNome,
  qtd
){

  const { data } = await sb

    .from("cotacoes")

    .select("*")

    .eq("id", cotacaoId)

    .single();

  let itensCotacao =
    data.itens_cotacao || [];

  let item =
    itensCotacao.find(i =>

      i.produto === produto

    );

  if(!item){

    item = {
      produto,
      qtd_solicitada:qtd,
      fornecedores:[]
    };

    itensCotacao.push(item);
  }

  item.fornecedores.push({

    fornecedor_id:
      fornecedorId,

    fornecedor_nome:
      fornecedorNome,

    preco_unitario:null,
    preco_total:null,
    quantidade_embalagem:1,
    unidade:"UN",
    prazo:"",
    marca:"",
    observacao:""

  });

  await sb

    .from("cotacoes")

    .update({

      itens_cotacao:itensCotacao,
      atualizado_em:new Date()

    })

    .eq("id", cotacaoId);

  cotacaoAtual.itens_cotacao =
    itensCotacao;

  abrirCotacao(cotacaoAtual);
}

/* ================= REMOVER ================= */

async function removerFornecedor(
  cotacaoId,
  produto,
  fornecedorId
){

  const confirmar =
    confirm(
      "Deseja remover este fornecedor?"
    );

  if(!confirmar)
    return;

  const { data } = await sb

    .from("cotacoes")

    .select("*")

    .eq("id", cotacaoId)

    .single();

  let itensCotacao =
    data.itens_cotacao || [];

  let item =
    itensCotacao.find(i =>

      i.produto === produto

    );

  if(item){

    item.fornecedores =
      item.fornecedores.filter(f =>

        f.fornecedor_id !== fornecedorId

      );
  }

  await sb

    .from("cotacoes")

    .update({

      itens_cotacao:itensCotacao,
      atualizado_em:new Date()

    })

    .eq("id", cotacaoId);

  cotacaoAtual.itens_cotacao =
    itensCotacao;

  abrirCotacao(cotacaoAtual);
}

/* ================= PESQUISA ================= */

function pesquisarFornecedor(
  input,
  dropdownId
){

  const termo =
    input.value.toLowerCase();

  const dropdown =
    document.getElementById(
      dropdownId
    );

  const itens =
    dropdown.querySelectorAll(
      ".dropdown-item"
    );

  itens.forEach(el => {

    const nome =
      el.dataset.nome.toLowerCase();

    el.style.display =
      nome.includes(termo)
      ? "block"
      : "none";

  });

}

/* ================= FILTRO ================= */

function filtrarCotacoes(){

  const termo =
    document.getElementById(
      "buscaCotacao"
    )
    .value
    .toLowerCase();

  const filtradas =
    cotacoes.filter(c =>

      (c.nome || "")
      .toLowerCase()
      .includes(termo)

    );

  renderCotacoes(filtradas);
}

/* ================= HELPERS ================= */

function formatarData(data){

  if(!data) return "-";

  return new Date(data)
    .toLocaleString("pt-BR");
}

function overlay(show){

  document.getElementById("overlay")
    .style.display =
      show ? "flex" : "none";
}

/* ================= REALTIME ================= */

sb.channel("cotacoes_realtime")

.on(
  "postgres_changes",
  {
    event:"UPDATE",
    schema:"public",
    table:"cotacoes"
  },
  payload => {

    carregarCotacoes();

    if(
      cotacaoAtual &&
      payload.new.id === cotacaoAtual.id
    ){

      cotacaoAtual =
        payload.new;

      abrirCotacao(
        cotacaoAtual
      );

    }

  }
)

.subscribe();

</script>

</body>
</html>
