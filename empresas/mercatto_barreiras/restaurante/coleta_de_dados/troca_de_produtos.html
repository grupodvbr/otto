<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Controle de Perdas • Mercatto</title>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* BASE */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
margin:0;
font-family:Inter;
background:#f1f5f9;
}

/* HEADER */
.header{
padding:18px;
background:#020617;
color:#fff;
font-weight:800;
font-size:20px;
}

/* CONTAINER */
.container{
padding:14px;
max-width:900px;
margin:auto;
}

/* CARD */
.card{
background:#fff;
padding:14px;
border-radius:16px;
box-shadow:0 6px 20px rgba(0,0,0,.06);
margin-bottom:14px;
}

/* INPUT */
textarea{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #e2e8f0;
margin-top:8px;
}

/* BUTTON */
button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#22c55e;
color:#fff;
font-weight:700;
margin-top:10px;
transition:.2s;
}

button:disabled{
opacity:.6;
}

/* DIAS */
.dias{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:10px;
}

.dia{
background:#fff;
padding:14px;
border-radius:14px;
text-align:center;
font-weight:700;
box-shadow:0 4px 12px rgba(0,0,0,.08);
cursor:pointer;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:#fff;
width:95%;
max-height:90%;
overflow:auto;
border-radius:18px;
padding:14px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
gap:8px;
}

.thumb{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:10px;
cursor:pointer;
}

.obs{
font-size:11px;
margin-top:4px;
color:#64748b;
}

/* VIEWER */
.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.viewer img{
max-width:95%;
max-height:85%;
border-radius:12px;
}

.close{
position:absolute;
top:20px;
right:20px;
color:#fff;
font-size:22px;
cursor:pointer;
}

/* LOADING */
.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
color:#fff;
z-index:9999;
}

.spinner{
width:40px;
height:40px;
border:4px solid #fff;
border-top:4px solid transparent;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:10px;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#16a34a;
color:#fff;
padding:12px 18px;
border-radius:12px;
display:none;
font-weight:600;
}

@media(min-width:768px){
.container{max-width:700px;}
}

</style>
</head>

<body>

<div class="header">📸 Controle de Perdas</div>

<div class="container">

<div class="card">
<div><b>Hoje:</b> <span id="dataHoje"></span></div>

<textarea id="obs" placeholder="Observação..."></textarea>

<input type="file" id="foto" accept="image/*" capture="environment">

<button id="btn" onclick="enviar()">Salvar</button>
</div>

<div id="dias" class="dias"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box" id="conteudo"></div>
</div>

<!-- VIEWER -->
<div class="viewer" id="viewer">
<div class="close" onclick="fecharViewer()">✕</div>
<img id="imgViewer">
</div>

<!-- LOADING -->
<div class="loading" id="loading">
<div class="spinner"></div>
Enviando registro...
</div>

<!-- TOAST -->
<div class="toast" id="toast">Registro salvo com sucesso</div>

<script>

const sb = window.supabase.createClient(
  "https://ehxrrpsiksceljmhsfxk.supabase.co",
  "sb_publishable_Jm2ZQKzPS3gNPCKSjFAmYQ_WNMYwF1j"
)

/* DATA */
function hoje(){
return new Date().toISOString().split("T")[0]
}

function formatar(d){
return d.split("-").reverse().join("/")
}

document.getElementById("dataHoje").innerText = formatar(hoje())

/* TOAST */
function mostrarToast(msg){
const t = document.getElementById("toast")
t.innerText = msg
t.style.display="block"
setTimeout(()=>t.style.display="none",2500)
}

/* ENVIAR */
async function enviar(){

const btn = document.getElementById("btn")
const loading = document.getElementById("loading")

btn.disabled = true
loading.style.display="flex"

try{

const file = document.getElementById("foto").files[0]
const obs = document.getElementById("obs").value

if(!file) throw "Selecione uma foto"

const nome = `perca_${Date.now()}.jpg`

const { error } = await sb.storage
.from("buffet_percas")
.upload(nome,file,{upsert:true})

if(error) throw "Erro no upload"

const { data } = sb.storage
.from("buffet_percas")
.getPublicUrl(nome)

await sb.from("percas").insert([{
data: hoje(),
observacao: obs,
foto_url: data.publicUrl
}])

document.getElementById("obs").value=""
document.getElementById("foto").value=""

mostrarToast("Registro salvo com sucesso")

carregarDias()

}catch(e){
mostrarToast(e)
}

loading.style.display="none"
btn.disabled = false
}

/* DIAS */
async function carregarDias(){

const { data } = await sb.from("percas").select("data")

const dias = [...new Set(data.map(d=>d.data))]

const div = document.getElementById("dias")
div.innerHTML=""

dias.forEach(d=>{
const el = document.createElement("div")
el.className="dia"
el.innerText=formatar(d)
el.onclick=()=>abrirDia(d)
div.appendChild(el)
})

}

/* ABRIR */
async function abrirDia(dia){

const { data } = await sb
.from("percas")
.select("*")
.eq("data",dia)

const conteudo = document.getElementById("conteudo")

conteudo.innerHTML = `<h3>${formatar(dia)}</h3><div class="grid">`

data.forEach(item=>{
conteudo.innerHTML += `
<div>
<img src="${item.foto_url}" class="thumb" onclick="ver('${item.foto_url}')">
<div class="obs">${item.observacao || ""}</div>
</div>
`
})

conteudo.innerHTML += "</div>"

document.getElementById("modal").style.display="flex"
}

/* VIEWER */
function ver(src){
document.getElementById("imgViewer").src = src
document.getElementById("viewer").style.display="flex"
}

function fecharViewer(){
document.getElementById("viewer").style.display="none"
}

/* FECHAR */
document.getElementById("modal").onclick = e=>{
if(e.target.id==="modal"){
e.target.style.display="none"
}
}

carregarDias()

</script>

</body>
</html>
