<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro de Cardápio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}

body{
background:#f3f4f6;
padding:20px;
}

/* HEADER */
.header{
font-size:24px;
font-weight:800;
margin-bottom:15px;
}

/* CARD */
.card{
background:#fff;
border-radius:16px;
padding:18px;
margin-bottom:15px;
box-shadow:0 8px 25px rgba(0,0,0,.06);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:12px;
}

/* FIELD */
.field{
display:flex;
flex-direction:column;
gap:5px;
}

label{
font-size:11px;
font-weight:800;
color:#374151;
}

/* INPUT */
input{
height:42px;
padding:10px;
border-radius:10px;
border:1px solid #e5e7eb;
font-size:14px;
}

input:focus{
border-color:#ff6a00;
outline:none;
}

/* DIAS */
.dias{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
margin-top:10px;
}

.dias label{
background:#f1f5f9;
padding:10px;
border-radius:10px;
font-size:12px;
text-align:center;
cursor:pointer;
font-weight:700;
}

.dias input{
display:none;
}

.dias input:checked + span{
background:#ff6a00;
color:#fff;
}

/* BUTTON */
button{
height:44px;
border:none;
border-radius:10px;
font-weight:800;
cursor:pointer;
}

.primary{
background:#ff6a00;
color:#fff;
}

.primary:hover{
background:#ea580c;
}

/* LISTA */
.lista{
display:grid;
gap:10px;
margin-top:10px;
}

.item{
background:#fff;
border-radius:12px;
padding:14px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #e5e7eb;
}

.nome{
font-weight:800;
}

.meta{
font-size:12px;
color:#6b7280;
}

.excluir{
background:#fee2e2;
color:#991b1b;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
font-weight:800;
}

</style>
</head>

<body>

<div class="header">📅 Cadastro de Cardápio</div>

<div class="card">

  <div class="grid">
    <div class="field">
      <label>Produto</label>
      <input id="nome" placeholder="Digite o nome do prato">
    </div>

    <div class="field">
      <label>Tara padrão (kg)</label>
      <input id="tara" placeholder="0,000">
    </div>
  </div>

  <label style="margin-top:12px">Dias da semana</label>

  <div class="dias" id="dias">

    <label><input type="checkbox" value="SEGUNDA"><span>SEG</span></label>
    <label><input type="checkbox" value="TERCA"><span>TER</span></label>
    <label><input type="checkbox" value="QUARTA"><span>QUA</span></label>
    <label><input type="checkbox" value="QUINTA"><span>QUI</span></label>
    <label><input type="checkbox" value="SEXTA"><span>SEX</span></label>
    <label><input type="checkbox" value="SABADO"><span>SAB</span></label>
    <label><input type="checkbox" value="DOMINGO"><span>DOM</span></label>

  </div>

  <button class="primary" style="margin-top:12px;width:100%" onclick="salvar()">
    Salvar no Cardápio
  </button>

</div>

<div class="card">
  <b>Produtos cadastrados</b>
  <div class="lista" id="lista"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const sb = window.supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

const empresa = "MERCATTO DELÍCIA";

// 🔥 FORÇAR MAIÚSCULO
document.getElementById("nome").addEventListener("input", e=>{
  e.target.value = e.target.value.toUpperCase();
});

function parsePeso(v){
  return Number(String(v || "0").replace(",", "."));
}

// SALVAR
async function salvar(){

  const nome = document.getElementById("nome").value.trim();
  const tara = parsePeso(document.getElementById("tara").value);

  const dias = [...document.querySelectorAll("#dias input:checked")]
                .map(i=>i.value);

  if(!nome || dias.length === 0){
    return alert("Preencha produto e dias");
  }

  for(const dia of dias){

    await sb.from("buffet_produtos").insert({
      empresa: empresa,
      nome: nome,
      tara_padrao: tara,
      dia_semana: dia
    });

  }

  document.getElementById("nome").value = "";
  document.getElementById("tara").value = "";
  document.querySelectorAll("#dias input").forEach(i=>i.checked=false);

  carregar();
}

// LISTAR
async function carregar(){

  const { data } = await sb
    .from("buffet_produtos")
    .select("*")
    .eq("empresa", empresa)
    .order("nome");

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  data?.forEach(item=>{
    lista.innerHTML += `
      <div class="item">
        <div>
          <div class="nome">${item.nome}</div>
          <div class="meta">${item.dia_semana} • Tara: ${item.tara_padrao || 0}</div>
        </div>
        <div class="excluir" onclick="excluir('${item.id}')">Excluir</div>
      </div>
    `;
  });
}

// EXCLUIR
async function excluir(id){
  if(!confirm("Excluir produto?")) return;

  await sb.from("buffet_produtos").delete().eq("id", id);
  carregar();
}

carregar();
</script>

</body>
</html>
