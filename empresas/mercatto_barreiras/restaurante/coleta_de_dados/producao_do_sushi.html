<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Controle Sushi</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
  --bg:#0b1220;
  --card:#111827;
  --primary:#22c55e;
  --danger:#ef4444;
  --text:#fff;
  --muted:#9ca3af;
}

body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:#fff;
}

/* HEADER */
.header{
  padding:18px;
  font-size:20px;
  font-weight:900;
  text-align:center;
  background:#020617;
}

/* BUSCA */
.search{
  padding:12px;
}

.search input{
  width:100%;
  height:44px;
  border-radius:12px;
  border:none;
  padding:0 14px;
}

/* BOTÃO REGISTROS */
.btn-registros{
  margin:0 12px 12px;
  height:44px;
  border-radius:12px;
  background:#2563eb;
  color:#fff;
  border:none;
  font-weight:800;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:var(--card);
  border-radius:14px;
  overflow:hidden;
  position:relative;
}

.card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

.card-body{
  padding:8px;
}

.badge{
  position:absolute;
  top:6px;
  right:6px;
  background:#22c55e;
  color:#fff;
  padding:4px 8px;
  border-radius:10px;
  font-size:11px;
  font-weight:900;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:flex-end;
}

.modal-box{
  width:100%;
  height:92%;
  background:#fff;
  color:#000;
  border-radius:20px 20px 0 0;
  padding:16px;
}

/* POPUP REGISTROS */
.modal-reg{
  position:fixed;
  inset:0;
  background:#000000dd;
  display:none;
  overflow:auto;
}

.box-reg{
  padding:16px;
}

/* INPUTS */
input,select{
  width:100%;
  height:44px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
  padding:10px;
}

.btn{
  height:46px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  font-weight:900;
}

.salvar{ background:#22c55e; color:#fff; }
.fechar{ background:#111; color:#fff; }

</style>
</head>

<body>

<div class="header">🍣 Controle Sushi</div>

<div class="search">
  <input id="busca" placeholder="Buscar sushi...">
</div>

<button class="btn-registros" onclick="abrirRegistros()">Ver Registros</button>

<div id="cards" class="grid"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">

    <h2 id="nome"></h2>

    <img id="foto" style="width:100%;height:160px;border-radius:12px;object-fit:cover">

    <p id="descricao"></p>

    <select id="tipo">
      <option>Produção</option>
      <option>Reaproveitamento</option>
      <option>Desperdício</option>
    </select>

    <input id="qtd" type="number" placeholder="Quantidade">

    <button class="btn salvar" onclick="salvar()">SALVAR</button>
    <button class="btn fechar" onclick="fechar()">FECHAR</button>

  </div>
</div>

<!-- REGISTROS -->
<div id="registros" class="modal-reg">
  <div class="box-reg">

    <input type="date" id="dataFiltro" onchange="carregarRegistros()">

    <div id="listaRegistros"></div>

    <button class="btn fechar" onclick="fecharRegistros()">Fechar</button>

  </div>
</div>

<script>

const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let lista = [];
let atual = null;

// 🔥 CARREGAR
async function carregar(){

  const { data } = await sb
    .from("buffet")
    .select("*")
    .eq("tipo","SUSHI");

  lista = data || [];

  atualizarCards();
}

// 🔥 PEGAR REGISTROS HOJE
async function pegarHoje(){

  const hoje = new Date().toISOString().slice(0,10);

  const { data } = await sb
    .from("controle_sushi")
    .select("*")
    .eq("data_registro", hoje);

  return data || [];
}

// 🔥 RENDER
async function atualizarCards(){

  const registros = await pegarHoje();

  cards.innerHTML="";

  lista.forEach(p=>{

    const total = registros
      .filter(r=>r.buffet_id===p.id)
      .reduce((s,r)=>s+Number(r.quantidade||0),0);

    const c = document.createElement("div");
    c.className="card";

    c.onclick = ()=>abrir(p);

    c.innerHTML = `
      ${total>0 ? `<div class="badge">${total}</div>` : ``}
      <img src="${p.foto_url||''}">
      <div class="card-body">
        <b>${p.nome}</b>
      </div>
    `;

    cards.appendChild(c);
  });
}

// 🔍 BUSCA
busca.oninput = ()=>{
  const v = busca.value.toLowerCase();
  atualizarCards(lista.filter(p=>p.nome.toLowerCase().includes(v)));
};

// 🔥 MODAL
function abrir(p){
  atual = p;
  modal.style.display="flex";

  nome.innerText = p.nome;
  descricao.innerText = p.descricao||"";
  foto.src = p.foto_url||"";
}

function fechar(){
  modal.style.display="none";
}

// 🔥 SALVAR
async function salvar(){

  const hoje = new Date().toISOString().slice(0,10);

  await sb.from("controle_sushi").insert({
    buffet_id: atual.id,
    nome: atual.nome,
    tipo: tipo.value,
    quantidade: qtd.value,
    data_registro: hoje
  });

  alert("Salvo!");
  fechar();
  atualizarCards();
}

// 🔥 REGISTROS
function abrirRegistros(){
  registros.style.display="block";

  const hoje = new Date().toISOString().slice(0,10);
  dataFiltro.value = hoje;

  carregarRegistros();
}

function fecharRegistros(){
  registros.style.display="none";
}

// 🔥 LISTA REGISTROS
async function carregarRegistros(){

  const data = dataFiltro.value;

  const { data: regs } = await sb
    .from("controle_sushi")
    .select("*")
    .eq("data_registro", data);

  listaRegistros.innerHTML="";

  regs.forEach(r=>{

    const editavel = data === new Date().toISOString().slice(0,10);

    listaRegistros.innerHTML += `
      <div style="background:#111;color:#fff;margin:10px;padding:10px;border-radius:10px">
        <b>${r.nome}</b><br>
        ${r.tipo} - ${r.quantidade}
        ${editavel ? `<button onclick="editar('${r.id}')">Editar</button>` : ``}
      </div>
    `;
  });
}

// INIT
carregar();

</script>

</body>
</html>
