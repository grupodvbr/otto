<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Requisições Mercatto</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
--azul:#007bff;
--verde:#28a745;
--vermelho:#dc3545;
--cinza:#f1f1f1;
--ink:#222;
--bg:#fff;
}
body.dark{
--cinza:#1e1e1e;
--ink:#eee;
--bg:#121212;
}
body{margin:0;font-family:Arial;background:var(--cinza);color:var(--ink)}
header{display:flex;justify-content:space-between;padding:10px;background:var(--bg);position:sticky;top:0}
.resumo{display:flex;gap:10px;padding:10px;background:var(--bg);flex-wrap:wrap}
.card-status{background:#eee;padding:8px;border-radius:8px;font-weight:bold}
.filtros{display:flex;gap:8px;padding:10px;background:var(--bg);flex-wrap:wrap}
.filtros input,.filtros select{padding:8px;border-radius:6px;border:1px solid #ccc}
table{width:100%;border-collapse:collapse;background:var(--bg)}
th,td{padding:8px;border:1px solid #ddd;text-align:center}
thead{background:var(--azul);color:#fff}
#overlay{
position:fixed;top:0;left:0;right:0;bottom:0;
background:rgba(255,255,255,0.9);
display:none;align-items:center;justify-content:center;
z-index:9999;flex-direction:column
}
.alerta{
position:fixed;top:10px;right:10px;
background:var(--verde);color:#fff;
padding:10px;border-radius:6px;display:none
}
</style>
</head>

<body>

<header>
<h2>REQUISIÇÕES</h2>
<button onclick="carregar()">🔄</button>
</header>

<div class="resumo">
<div>PENDENTE: <span id="pend">0</span></div>
<div>CARRINHO: <span id="carrinho">0</span></div>
<div>COMPRADO: <span id="comp">0</span></div>
<div>NEGADO: <span id="neg">0</span></div>
<div>ENTREGUE: <span id="ent">0</span></div>
</div>

<div class="filtros">
<input id="busca" placeholder="Buscar">
<select id="status">
<option value="TODOS">TODOS</option>
<option>PENDENTE</option>
<option>COMPRADO</option>
<option>NO CARRINHO</option>
<option>NEGADO</option>
<option>ENTREGUE</option>
</select>
</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Item</th>
<th>Qtd</th>
<th>Setor</th>
<th>Solicitante</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<div id="overlay">
<img src="https://static.wixstatic.com/media/d830b0_8cec50a98bbf4775814dbfa5386585e8~mv2.png" width="80">
<p>Carregando...</p>
</div>

<div class="alerta" id="alerta"></div>

<script>
const sb = supabase.createClient(
"https://mybsriouiwqsdufujbsc.supabase.co",
"sb_publishable_AUyBEIVCAMUoXwDKUmlqSw_v8EY8rVN"
);

let dados=[];

/* ================= ALERTA ================= */
function alerta(msg){
const a=document.getElementById("alerta");
a.innerText=msg;
a.style.display="block";
setTimeout(()=>a.style.display="none",2000);
}

/* ================= CARREGAR ================= */
async function carregar(){

document.getElementById("overlay").style.display="flex";

const {data,error}=await sb
.from("requisicoes")
.select("*")
.order("created_at",{ascending:false})
.limit(20);

if(error){
console.error(error);
alerta("Erro ao carregar");
return;
}

dados=(data||[]);

render();
document.getElementById("overlay").style.display="none";
}

/* ================= RENDER ================= */
function render(){

const busca=document.getElementById("busca").value.toLowerCase();
const statusFiltro=document.getElementById("status").value;

let lista=dados.filter(i=>{
const st=i.status||"PENDENTE";
if(statusFiltro!=="TODOS" && st!==statusFiltro) return false;
if(busca && !i.produto.toLowerCase().includes(busca)) return false;
return true;
});

const tabela=document.getElementById("tabela");
tabela.innerHTML="";

lista.forEach(i=>{
tabela.innerHTML+=`
<tr>
<td>${new Date(i.created_at).toLocaleString()}</td>
<td>${i.produto}</td>
<td>${parseInt(i.quantidade)}</td>
<td>${i.setor}</td>
<td>${i.usuario}</td>
<td>
<select onchange="update('${i.id}',this.value)">
<option ${i.status==="PENDENTE"?"selected":""}>PENDENTE</option>
<option ${i.status==="COMPRADO"?"selected":""}>COMPRADO</option>
<option ${i.status==="NO CARRINHO"?"selected":""}>NO CARRINHO</option>
<option ${i.status==="NEGADO"?"selected":""}>NEGADO</option>
<option ${i.status==="ENTREGUE"?"selected":""}>ENTREGUE</option>
</select>
</td>
</tr>
`;
});

contar();
}

/* ================= UPDATE ================= */
async function update(id,status){

alerta("Atualizando...");

const {error}=await sb
.from("requisicoes")
.update({status})
.eq("id",id);

if(error){
alerta("Erro");
return;
}

const item=dados.find(i=>i.id===id);
if(item) item.status=status;

render();
alerta("Atualizado");
}

/* ================= CONTADORES ================= */
function contar(){
let c={PENDENTE:0,COMPRADO:0,"NO CARRINHO":0,NEGADO:0,ENTREGUE:0};

dados.forEach(i=>{
const s=i.status||"PENDENTE";
if(c[s]!=null) c[s]++;
});

pend.innerText=c.PENDENTE;
comp.innerText=c.COMPRADO;
carrinho.innerText=c["NO CARRINHO"];
neg.innerText=c.NEGADO;
ent.innerText=c.ENTREGUE;
}

/* ================= EVENTOS ================= */
document.getElementById("busca").oninput=render;
document.getElementById("status").onchange=render;

window.onload=carregar;
</script>

</body>
</html>
