<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nova Cotação</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:Inter;
  background:#eef2f7;
}

.container{
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.top{
  padding:20px;
  background:#fff;
  box-shadow:0 5px 20px rgba(0,0,0,.05);
}

.top h2{
  margin:0 0 10px;
}

.row{
  display:flex;
  gap:10px;
}

input,select{
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  flex:1;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

.main{
  flex:1;
  display:flex;
  gap:20px;
  padding:20px;
}

.left{
  flex:2;
  background:#fff;
  border-radius:16px;
  padding:20px;
  overflow:auto;
}

.right{
  flex:1;
  background:#fff;
  border-radius:16px;
  padding:20px;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:12px;
  border-radius:10px;
  background:#f3f4f6;
  margin-bottom:10px;
}

.badge{
  background:#dbeafe;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
}

.title{
  font-weight:700;
  margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="top">

<h2>💰 Nova Cotação</h2>

<div class="row">
<input id="nome" placeholder="Nome da cotação">
<input id="dataCotacao" type="date">
<input id="dataHoje" disabled>
<button onclick="criar()">Salvar Cotação</button>
</div>

</div>

<div class="main">

<div class="left">

<div class="title">Adicionar Itens</div>

<div class="row">
<select id="produtoSelect"></select>
<input id="produtoManual" placeholder="Produto manual" style="display:none">
<input id="qtd" type="number" placeholder="Qtd">
<button onclick="addItem()">Adicionar</button>
</div>

<br>

<div id="listaItens"></div>

</div>

<div class="right">

<div class="title">Resumo</div>

<div id="resumo"></div>

</div>

</div>

</div>

<script>

const sb = supabase.createClient(
 "https://dxkszikemntfusfyrzos.supabase.co",
 "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

const el = id => document.getElementById(id);

let itens = [];

// =====================
// DATA HOJE
// =====================
function hoje(){
  return new Date().toLocaleDateString("pt-BR");
}
el("dataHoje").value = hoje();

// =====================
// CARREGAR ESTOQUE
// =====================
async function carregarProdutos(){

  const { data } = await sb
    .from("mercatto_estoque")
    .select("produto")
    .eq("ativo", true);

  if(!data || data.length === 0){
    el("produtoSelect").style.display = "none";
    el("produtoManual").style.display = "block";
    return;
  }

  el("produtoSelect").innerHTML =
    `<option value="">Selecione</option>` +
    data.map(p=>`<option>${p.produto}</option>`).join("");
}

// =====================
// ADD ITEM
// =====================
function addItem(){

  let nome = el("produtoSelect").value || el("produtoManual").value;
  let qtd = Number(el("qtd").value);

  if(!nome || !qtd){
    alert("Preencha corretamente");
    return;
  }

  itens.push({
    produto: nome,
    quantidade: qtd
  });

  el("qtd").value = "";

  renderItens();
  renderResumoPreview();
}

// =====================
// RENDER ITENS
// =====================
function renderItens(){

  el("listaItens").innerHTML = itens.map((i,index)=>`
    <div class="item">
      <div>${i.produto} (${i.quantidade})</div>
      <div onclick="remover(${index})" style="cursor:pointer">❌</div>
    </div>
  `).join("");
}

// =====================
// REMOVER
// =====================
function remover(i){
  itens.splice(i,1);
  renderItens();
  renderResumoPreview();
}

// =====================
// RESUMO PREVIEW
// =====================
function renderResumoPreview(){

  el("resumo").innerHTML = `
    <p><b>Itens:</b> ${itens.length}</p>
    <p><b>Status:</b> Em criação</p>
  `;
}

// =====================
// CRIAR COTAÇÃO
// =====================
async function criar(){

  const nome = el("nome").value;
  const dataC = el("dataCotacao").value;

  if(!nome || !dataC || itens.length === 0){
    alert("Preencha tudo e adicione itens");
    return;
  }

  const { data, error } = await sb
    .from("cotacoes")
    .insert([{
      nome,
      data_cotacao: dataC,
      itens
    }])
    .select();

  if(error){
    console.error(error);
    alert("Erro ao salvar");
    return;
  }

  alert("Cotação criada com sucesso!");

  itens = [];
  renderItens();
  renderResumoPreview();
}

// =====================
carregarProdutos();

</script>

</body>
</html>
