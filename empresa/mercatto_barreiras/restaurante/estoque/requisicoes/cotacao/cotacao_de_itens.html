<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cotação Inteligente</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:Inter;
  background:#f1f5f9;
}

.top{
  background:#fff;
  padding:20px;
  box-shadow:0 5px 20px rgba(0,0,0,.05);
}

.search{
  display:flex;
  gap:10px;
}

.search input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
}

.search-results{
  background:#fff;
  border-radius:10px;
  margin-top:5px;
  max-height:200px;
  overflow:auto;
  box-shadow:0 10px 20px rgba(0,0,0,.1);
}

.search-item{
  padding:10px;
  cursor:pointer;
}

.search-item:hover{
  background:#f3f4f6;
}

.container{
  padding:20px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

th{
  background:#111827;
  color:#fff;
  padding:12px;
}

td{
  padding:10px;
  text-align:center;
  border-bottom:1px solid #eee;
}

input{
  width:80px;
  padding:6px;
  border-radius:6px;
  border:1px solid #ccc;
  text-align:center;
}

.resultado{
  font-weight:700;
  color:#2563eb;
}

.alerta{ background:#fee2e2; }
.ok{ background:#dcfce7; }

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:#fff;
  cursor:pointer;
}

.remove{
  cursor:pointer;
  color:red;
}

</style>
</head>

<body>

<div class="top">

<h2>📦 Montar Cotação</h2>

<div class="search">
<input id="busca" placeholder="Buscar produto..." oninput="buscar()">
<input id="qtdAdd" type="number" placeholder="Qtd">
</div>

<div id="resultados" class="search-results"></div>

</div>

<div class="container">

<table>
<thead>
<tr>
<th>Produto</th>
<th>Atual</th>
<th>Mín</th>
<th>Ideal</th>
<th>Comprar</th>
<th>Resultado</th>
<th></th>
</tr>
</thead>

<tbody id="body"></tbody>

</table>

<br>

<button onclick="salvar()">Salvar Cotação</button>

</div>

<script>

const sb = supabase.createClient(
 "https://dxkszikemntfusfyrzos.supabase.co",
 "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let estoque = [];
let selecionados = [];

// =====================
// CARREGAR ESTOQUE
// =====================
async function carregar(){

  const { data } = await sb
    .from("mercatto_estoque")
    .select("*")
    .eq("ativo", true);

  estoque = data;
}

carregar();

// =====================
// BUSCA
// =====================
function buscar(){

  const termo = busca.value.toLowerCase();

  if(!termo){
    resultados.innerHTML = "";
    return;
  }

  const filtrados = estoque.filter(p =>
    p.produto.toLowerCase().includes(termo)
  ).slice(0,10);

  resultados.innerHTML = filtrados.map(p=>`
    <div class="search-item" onclick="add('${p.id}')">
      ${p.produto}
    </div>
  `).join("");
}

// =====================
// ADD PRODUTO
// =====================
function add(id){

  const qtd = Number(qtdAdd.value);

  if(!qtd){
    alert("Informe quantidade");
    return;
  }

  const p = estoque.find(x => x.id === id);

  if(selecionados.find(x => x.id === id)){
    alert("Já adicionado");
    return;
  }

  selecionados.push({
    ...p,
    comprar: qtd
  });

  resultados.innerHTML = "";
  busca.value = "";
  qtdAdd.value = "";

  render();
}

// =====================
// RENDER
// =====================
function render(){

  body.innerHTML = selecionados.map((d,i)=>{

    const resultado = Number(d.saldo) + Number(d.comprar);

    let classe = "";
    if(resultado < d.estoque_minimo) classe = "alerta";
    else if(resultado >= d.estoque_ideal) classe = "ok";

    return `
    <tr class="${classe}">
      <td>${d.produto}</td>
      <td>${d.saldo}</td>
      <td>${d.estoque_minimo}</td>
      <td>${d.estoque_ideal}</td>

      <td>
        <input type="number"
          value="${d.comprar}"
          onchange="update(${i}, this.value)">
      </td>

      <td class="resultado">${resultado}</td>

      <td class="remove" onclick="remover(${i})">✖</td>
    </tr>
    `;
  }).join("");
}

// =====================
function update(i,val){
  selecionados[i].comprar = Number(val);
  render();
}

// =====================
function remover(i){
  selecionados.splice(i,1);
  render();
}

// =====================
// SALVAR
// =====================
async function salvar(){

  if(selecionados.length === 0){
    alert("Nenhum item");
    return;
  }

  const nome = prompt("Nome da cotação:");
  if(!nome) return;

  const itens = selecionados.map(d=>({
    produto: d.produto,
    comprar: d.comprar,
    atual: d.saldo,
    minimo: d.estoque_minimo,
    ideal: d.estoque_ideal,
    resultado: d.saldo + d.comprar
  }));

  await sb.from("cotacoes").insert([{
    nome,
    data_cotacao: new Date(),
    itens
  }]);

  alert("Cotação salva!");

  selecionados = [];
  render();
}

</script>

</body>
</html>
