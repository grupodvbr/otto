<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cotação</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:Inter;
  background:#eef2f7;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.header{
  font-size:22px;
  font-weight:700;
  margin-bottom:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  margin-bottom:20px;
}

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

input,select{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
}

button{
  background:#2563eb;
  color:#fff;
  border:none;
  border-radius:10px;
  padding:12px 18px;
  cursor:pointer;
  font-weight:600;
}

button:hover{
  background:#1d4ed8;
}

.itens{
  margin-top:15px;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-radius:10px;
  background:#f3f4f6;
  margin-bottom:8px;
}

.resumo{
  border-left:6px solid #2563eb;
}

.small{
  color:#6b7280;
  font-size:13px;
}

.badge{
  background:#dbeafe;
  color:#1e3a8a;
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">💰 Nova Cotação</div>

<div class="card">

<div class="row">
<input id="nome" placeholder="Nome da cotação">
<input id="dataCotacao" type="date">
<input id="dataHoje" disabled>
</div>

<br>

<button onclick="criar()">Criar Cotação</button>

</div>

<div id="areaItens" class="card" style="display:none">

<h3>Itens da Cotação</h3>

<div class="row">
<select id="produtoSelect"></select>
<input id="produtoManual" placeholder="Ou digite produto" style="display:none">
<input id="qtd" type="number" placeholder="Qtd">
<button onclick="addItem()">Adicionar</button>
</div>

<div class="itens" id="listaItens"></div>

</div>

<div id="resumo"></div>

</div>

<script>

const sb = supabase.createClient(
 "https://dxkszikemntfusfyrzos.supabase.co",
 "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let cotacaoId = null;
let itens = [];

// =====================
// DATA HOJE
// =====================
function hoje(){
  const d = new Date();
  return d.toLocaleDateString("pt-BR");
}

dataHoje.value = hoje();

// =====================
// CARREGAR ESTOQUE
// =====================
async function carregarProdutos(){

  const { data } = await sb
    .from("mercatto_estoque")
    .select("produto")
    .eq("ativo", true);

  if(!data || data.length === 0){
    produtoSelect.style.display = "none";
    produtoManual.style.display = "block";
    return;
  }

  produtoSelect.innerHTML =
    `<option value="">Selecione produto</option>` +
    data.map(p=>`<option>${p.produto}</option>`).join("");
}

// =====================
// CRIAR COTAÇÃO
// =====================
async function criar(){

const nomeInput = document.getElementById("nome").value;
const dataC = document.getElementById("dataCotacao").value;

  const { data, error } = await sb
    .from("cotacoes")
    .insert([{ nome, data_cotacao: dataC }])
    .select();

  if(error){
    alert("Erro");
    return;
  }

  cotacaoId = data[0].id;

  areaItens.style.display = "block";

  renderResumo(data[0]);
}

// =====================
// ADD ITEM
// =====================
async function addItem(){

  let produtoNome = produtoSelect.value || produtoManual.value;
  let quantidade = Number(qtd.value);

  if(!produtoNome || !quantidade){
    alert("Preencha corretamente");
    return;
  }

  itens.push({
    produto: produtoNome,
    quantidade
  });

  await salvar();

  renderItens();
  atualizarResumo();

  qtd.value = "";
}

// =====================
// SALVAR JSON
// =====================
async function salvar(){

  await sb
    .from("cotacoes")
    .update({
      itens,
      atualizado_em: new Date()
    })
    .eq("id", cotacaoId);
}

// =====================
// RENDER ITENS
// =====================
function renderItens(){

  listaItens.innerHTML = itens.map((i,index)=>`
    <div class="item">
      <div>${i.produto} (${i.quantidade})</div>
      <div onclick="remover(${index})" style="cursor:pointer">❌</div>
    </div>
  `).join("");
}

// =====================
// REMOVER ITEM
// =====================
function remover(index){
  itens.splice(index,1);
  salvar();
  renderItens();
  atualizarResumo();
}

// =====================
// RESUMO
// =====================
async function atualizarResumo(){

  const { data } = await sb
    .from("cotacoes")
    .select("*")
    .eq("id", cotacaoId)
    .single();

  renderResumo(data);
}

function renderResumo(d){

  resumo.innerHTML = `
    <div class="card resumo">
      <h3>${d.nome}</h3>

      <div class="small">📅 Data Cotação: ${d.data_cotacao || "-"}</div>
      <div class="small">📆 Criado: ${hoje()}</div>

      <br>

      <div class="badge">Itens: ${d.itens?.length || 0}</div>
      <div class="badge">${d.status}</div>

      <br><br>

      <button onclick="realizar()">Realizar Cotação</button>
    </div>
  `;
}

// =====================
function realizar(){
  alert("Etapa 2: Tela estilo Excel com fornecedores");
}

// =====================
carregarProdutos();

</script>

</body>
</html>
