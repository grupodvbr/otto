<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESTOQUE MERCATTO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ============================= */
:root {
  --bg: #f1f5f9;
  --content-bg: #ffffff;
  --card-bg: #ffffff;

  --azul: #2563eb;
  --azul-hover: #1d4ed8;
  --azul-light: #60a5fa;

  --texto: #0f172a;
  --texto-sec: #475569;

  --borda: #e2e8f0;

  --shadow: 0 10px 30px rgba(0,0,0,0.08);
  --shadow-strong: 0 20px 50px rgba(0,0,0,0.12);
}

/* RESET */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

/* ============================= */
/* FUNDO */
body {
  background: var(--bg);
  height:100vh;
  display:flex;
  overflow:hidden;
  color: var(--texto);
}

/* ============================= */
/* CONTEÚDO */
#content {
  flex:1;
  padding:35px;
  overflow-y:auto;

  background: var(--content-bg);
  border-radius:20px;
  margin:15px;

  box-shadow: var(--shadow);
}

/* =============================
   SPLASH
============================= */
#splash {
  position:fixed;
  width:100%;
  height:100%;
  background: linear-gradient(135deg, #2563eb, #60a5fa);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999999;
  flex-direction:column;
  animation: fadeOut 1s ease forwards;
  animation-delay:2.4s;
}

#splash h1 {
  font-size:58px;
  color:white;
  letter-spacing:6px;
  opacity:0;
  animation: fadeInUp 1.2s ease forwards;
  position:relative;
}

#splash h1::after {
  content:"";
  position:absolute;
  top:0;
  left:-150%;
  width:100%;
  height:100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.6),
    transparent
  );
  animation: shineMove 2s ease forwards;
  animation-delay:0.4s;
}

/* animações */
@keyframes shineMove {
  0% { left:-150%; }
  100% { left:150%; }
}

@keyframes fadeInUp {
  from { opacity:0; transform:translateY(40px);}
  to { opacity:1; transform:translateY(0);}
}

@keyframes fadeOut {
  to { opacity:0; visibility:hidden;}
}

/* =============================
   SIDEBAR
============================= */
#sidebar {
  width:270px;
  background: #0f172a;
  padding:25px 15px;
  color:white;
  box-shadow: var(--shadow-strong);
  position:relative;
}

#sidebar.minimized {
  width:75px;
}

/* botão */
#toggleSidebar {
  position:absolute;
  top:20px;
  right:-15px;
  width:36px;
  height:36px;
  background: var(--azul);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  color:white;
}

/* título */
.sidebar-title {
  font-size:22px;
  font-weight:600;
  margin-bottom:25px;
  letter-spacing:2px;
}

/* menu */
.nav-item {
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:12px;

  background: rgba(255,255,255,0.05);
  transition:0.25s;
}

.nav-item:hover {
  background: var(--azul);
  transform:translateX(6px);
}

/* =============================
   TÍTULO
============================= */
#content h1 {
  font-size:32px;
  margin-bottom:25px;
  color: var(--texto);
}

/* =============================
   CARDS
============================= */
.cards {
  display:flex;
  gap:25px;
  flex-wrap:wrap;
}

.card {
  width:220px;
  background: var(--card-bg);
  border-radius:16px;
  padding:20px;
  text-align:center;
  cursor:pointer;

  position:relative;
  overflow:hidden;

  border:1px solid var(--borda);
  box-shadow: var(--shadow);

  transition:0.3s;
}

/* brilho */
.card::after {
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:100%;
  height:100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(96,165,250,0.4),
    transparent
  );
}

/* hover */
.card:hover {
  transform:translateY(-8px) scale(1.03);
  box-shadow: var(--shadow-strong);
}

.card:hover::after {
  animation: shineMove 1.5s ease;
}

.card img {
  width:110px;
  height:110px;
  margin-bottom:12px;
  object-fit:contain;
}

.card p {
  font-weight:600;
  color: var(--texto);
}

/* =============================
   IFRAME
============================= */
#iframePage {
  width:100%;
  height:88vh;
  border:none;
  display:none;
  border-radius:14px;
  box-shadow: var(--shadow);
}

/* =============================
   SCROLL
============================= */
::-webkit-scrollbar {
  width:8px;
}

::-webkit-scrollbar-thumb {
  background: var(--azul);
  border-radius:10px;
}

/* =============================
   RESPONSIVO
============================= */
@media(max-width:768px){
  #sidebar {
    position:absolute;
    z-index:999;
  }

  .card {
    width:100%;
  }
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <h1>ESTOQUE MERCATTO</h1>
</div>

<script>
// REMOVE O SPLASH PARA SEMPRE
setTimeout(() => {
  document.getElementById("splash").remove();
}, 2600);
</script>

<!-- SIDEBAR -->
<div id="sidebar">

  <div id="toggleSidebar" onclick="toggleMenu()">☰</div>

  <div class="sidebar-title">ESTOQUE</div>

  <div class="nav-item" onclick="loadPage()">
    🏠 <span class="nav-text">Página Inicial</span>
  </div>

  <div class="nav-item" onclick="loadIframe('comparacao.html')">
    📦 <span class="nav-text">Itens</span>
  </div>

  <div class="nav-item" onclick="loadIframe('documentos.html')">
    📁 <span class="nav-text">Documentação</span>
  </div>

  <div class="nav-item" onclick="loadIframe('licitacoes.html')">
    📊 <span class="nav-text">Licitações</span>
  </div>

  <div class="nav-item" onclick="loadIframe('pagina4.html')">
    ⚙️ <span class="nav-text">Configurações</span>
  </div>

</div>

<!-- CONTEÚDO -->
<div id="content">

  <div id="homeSection">
    <h1>Sistema de Licitações</h1>

    <div class="cards">

      <div class="card" onclick="window.open('https://www.gov.br/compras/pt-br', '_blank')">
        <img src="https://raw.githubusercontent.com/grupodvbr/cotacao/main/paste/Design%20sem%20nome%20(28).png">
        <p>Compras.gov</p>
      </div>

      <div class="card" onclick="window.open('https://minha.effecti.com.br/#/', '_blank')">
        <img src="https://raw.githubusercontent.com/grupodvbr/cotacao/main/paste/Design%20sem%20nome%20(29).png">
        <p>Effecti</p>
      </div>

    </div>
  </div>

  <iframe id="iframePage"></iframe>

</div>

<script>
/* recolher menu */
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("minimized");
}

/* abrir páginas */
function loadIframe(url){
  homeSection.style.display="none";
  iframePage.style.display="block";
  iframePage.src = url;
}

function loadPage(){
  homeSection.style.display="block";
  iframePage.style.display="none";
}
</script>

</body>
</html>
