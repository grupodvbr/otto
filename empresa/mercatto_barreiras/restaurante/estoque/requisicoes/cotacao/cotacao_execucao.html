<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Execução de Cotação PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* BASE */
body{
  margin:0;
  font-family:Inter;
  background:#eef2f7;
}

.header{
  background:#0f172a;
  color:#fff;
  padding:15px 20px;
  font-weight:600;
}

.top{
  display:flex;
  gap:10px;
  padding:15px;
  background:#fff;
  border-bottom:1px solid #e5e7eb;
}

select,button{
  padding:10px 12px;
  border-radius:8px;
  border:1px solid #ddd;
  font-weight:500;
}

button{
  background:#2563eb;
  color:#fff;
}

.table-wrap{
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th{
  background:#020617;
  color:#fff;
  padding:10px;
  font-size:12px;
  font-weight:600;
}

td{
  padding:8px;
  border-bottom:1px solid #eee;
  text-align:center;
}

/* PRODUTO */
.prod{
  text-align:left;
  width:260px;
}

.prod strong{
  font-size:14px;
}

.prod span{
  font-size:11px;
  color:#64748b;
}

/* BLOCO FORNECEDOR */
.box{
  display:flex;
  flex-direction:column;
  gap:5px;
}

/* INPUTS */
.row{
  display:flex;
  gap:4px;
}

input{
  width:70px;
  padding:6px;
  border-radius:6px;
  border:1px solid #ccc;
  text-align:center;
}

/* RESULTADO */
.result{
  font-size:13px;
  font-weight:700;
}

/* CORES SUAVES */
.verde{ background:#ecfdf5; }
.vermelho{ background:#fef2f2; }
.laranja{ background:#fffbeb; }

  
</style>
</head>

<body>

<div class="header">
  <h2 id="titulo"></h2>
</div>

<div class="top">
  <select id="fornecedorSelect"></select>
  <button onclick="addFornecedor()">+ Fornecedor</button>
</div>

<div class="table-wrap">
<table>
<thead id="thead"></thead>
<tbody id="tbody"></tbody>
</table>
</div>

<script>

const sb = supabase.createClient(
 "https://dxkszikemntfusfyrzos.supabase.co",
 "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

const id = new URLSearchParams(location.search).get("id");

let cotacao;
let fornecedores = [];
let selecionados = [];
let estoque = [];

/* INIT */
async function init(){

  const { data } = await sb
    .from("cotacoes")
    .select("*")
    .eq("id", id)
    .single();

  cotacao = data;
  titulo.innerText = cotacao.nome;

  const { data: forn } = await sb
    .from("fornecedores_mercatto")
    .select("*");

  fornecedores = forn;

  fornecedorSelect.innerHTML = forn.map(f=>`
    <option value="${f.id}">${f.nome}</option>
  `).join("");

  const { data: est } = await sb
    .from("mercatto_estoque")
    .select("*");

  estoque = est;

  render();
}

/* ADD FORNECEDOR */
function addFornecedor(){

  const f = fornecedorSelect.value;

  if(selecionados.includes(f)) return;

  selecionados.push(f);

  render();
}

/* RENDER */
function render(){

  const itens = cotacao.itens;

  thead.innerHTML = `
    <tr>
      <th>Produto</th>
      <th>Qtd</th>
      ${selecionados.map(f=>`<th>${getNome(f)}</th>`).join("")}
    </tr>
  `;

  tbody.innerHTML = itens.map((i,index)=>{

    const prod = estoque.find(p=>p.produto === i.produto);

    const und = prod?.und_compra || "UN";
    const qtdUni = prod?.qtd_unidades || 1;

    let linha = `
      <tr>
        <td class="prod">
          <strong>${i.produto}</strong><br>
          <span>${qtdUni} UN por ${und}</span>
        </td>
        <td>${i.comprar}</td>
    `;

    selecionados.forEach(f=>{
      linha += `
        <td id="cell_${index}_${f}">
          <div class="box">

            <div class="row">
              <input placeholder="R$" oninput="calc(${index})" id="p_${index}_${f}">
            </div>

            <div id="r_${index}_${f}" class="result"></div>

          </div>
        </td>
      `;
    });

    linha += `</tr>`;
    return linha;

  }).join("");
}

/* CALCULO */
function calc(index){

  const item = cotacao.itens[index];
  const prod = estoque.find(p=>p.produto === item.produto);

  const qtdUni = prod?.qtd_unidades || 1;

  let valores = [];

  selecionados.forEach(f=>{

    let elInput = document.getElementById(`p_${index}_${f}`);
    let valor = elInput.value.replace(",", ".");

    if(!valor) return;

    let preco = Number(valor);

    if(isNaN(preco)) return;

    const custo = preco / qtdUni;

    document.getElementById(`r_${index}_${f}`).innerText =
      "R$ " + custo.toFixed(2);

    valores.push({f, custo});
  });

  if(valores.length < 2) return;

  const menor = Math.min(...valores.map(v=>v.custo));
  const maior = Math.max(...valores.map(v=>v.custo));

  valores.forEach(v=>{

    const el = document.getElementById(`cell_${index}_${v.f}`);

    el.classList.remove("verde","vermelho","laranja");

    if(v.custo === menor){
      el.classList.add("verde");
    } else if(v.custo === maior){
      el.classList.add("vermelho");
    } else {
      el.classList.add("laranja");
    }

  });

  salvar();
}

/* SALVAR */
async function salvar(){
  await sb.from("cotacoes").update({
    atualizado_em:new Date()
  }).eq("id", cotacao.id);
}

/* AUX */
function getNome(id){
  return fornecedores.find(f=>f.id===id)?.nome || "";
}

init();

</script>

</body>
</html>
